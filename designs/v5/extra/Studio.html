<script type="text/babel">
const { useState } = React;

const STUDIO_RECORDING = {
  id:"REC-001", guest:"Alex Morgan", title:"Inside the Procurement Black Box", duration:"42:18",
  linkedBrief: {
    id:"BR-006", episode:"Inside the Procurement Black Box", segment:"Sweetspot",
    brandVoice:"The Revenue Engine", status:"Approved",
    hook:"Every enterprise AI POC has a procurement failure hiding inside a technology story.",
  },
};

const TRANSCRIPT = [
  { time:"00:00:15", speaker:"HOST",        text:"Alex, welcome to the show. You've been CIO at Lattice for three years now — a company at that interesting inflection point between scrappy startup and mature enterprise. Before we dive in, set the scene for us." },
  { time:"00:00:28", speaker:"ALEX MORGAN", text:"Thanks for having me. At Lattice we're around 400 people, which puts us in this awkward zone — too big to move fast like a startup, too small to have dedicated procurement infrastructure. I'm responsible for every piece of technology that touches the business: infrastructure, security, internal tooling, and increasingly, AI." },
  { time:"00:01:12", speaker:"HOST",        text:"You've described enterprise AI procurement as a 'black box.' What do you actually mean by that phrase?" },
  { time:"00:01:20", speaker:"ALEX MORGAN", text:"Here's the pattern I see over and over. A vendor comes in, does a demo with engineering. Engineering loves it, they run a POC, the POC goes well. And then it hits the procurement layer. Suddenly it's like the demo never happened. Everything slows down. Legal needs to review the data processing agreement. Security needs a vendor questionnaire. Finance needs to understand the pricing model. And the vendor is completely unprepared for any of this." },
  { time:"00:02:45", speaker:"HOST",        text:"Is the vendor unprepared because they don't know, or because they haven't prioritised it?" },
  { time:"00:02:51", speaker:"ALEX MORGAN", text:"Both, honestly. But mostly it's information asymmetry. The person who championed the tool internally — usually a senior engineer or a tech lead — doesn't know what procurement is going to ask. And procurement doesn't know enough about the tool to ask the right questions. The two sides never speak directly until it's too late, and by then the vendor has already lost faith in the deal." },
  { time:"00:04:10", speaker:"HOST",        text:"So what's the fix? How should companies structure this better?" },
  { time:"00:04:15", speaker:"ALEX MORGAN", text:"Designate an internal champion who understands both worlds. Not the CTO — they're too senior and too removed from the details. The sweet spot is usually a Head of Engineering Ops or a senior technical program manager. Someone who can translate between engineering excitement and procurement reality. They need to be in the room for the demo and in the room for the security review." },
  { time:"00:06:33", speaker:"HOST",        text:"Let's talk about the security review specifically, because I hear this is where a lot of deals die." },
  { time:"00:06:40", speaker:"ALEX MORGAN", text:"The security review is not the problem. Arriving at it unprepared is the problem. Every vendor should know exactly what a security review looks like before they walk in. SOC 2 Type II report, data residency documentation, subprocessor list, penetration test results. These aren't surprises — they're table stakes. If your vendor can't produce these immediately, that's the red flag, not the review itself." },
  { time:"00:09:02", speaker:"HOST",        text:"You mentioned earlier that engineering and procurement don't talk. How does that break down in practice?" },
  { time:"00:09:10", speaker:"ALEX MORGAN", text:"Picture this: the engineer evaluates the tool on technical merit. Does it integrate with our stack? Is the API well-documented? Is the latency acceptable? All legitimate questions. But procurement is evaluating on completely different criteria. What's the contractual flexibility? Who holds the data if we terminate? What's the indemnity clause look like? These two sets of questions almost never get asked at the same time, in the same room, by the same team." },
  { time:"00:11:48", speaker:"HOST",        text:"What would you tell a vendor who is about to walk into their first enterprise deal?" },
  { time:"00:11:55", speaker:"ALEX MORGAN", text:"Prepare like a scout. Know the objections before they're raised. Have your security documentation ready on day one. Find out who the internal champion is and give them everything they need to build a business case — not just technical specs, but cost savings, time saved per week per person, risk reduction. Give them a number a CFO can put in a spreadsheet. That's the document that actually gets deals across the line." },
];

      <main className="flex-1 overflow-y-auto">

              <div className="bg-white rounded-card shadow-card overflow-hidden">
                <div className="relative w-full flex items-center justify-center" style={{background:"#0D0D1A",aspectRatio:"16/9"}}>
                  <div className="flex flex-col items-center gap-3 opacity-50">
                    <div className="w-16 h-16 rounded-full border-2 border-white/20 grid place-items-center">
                      <Icon d={I.play} size={24} fill="white" className="text-white"/>
                    </div>
                    <span className="text-white/50 text-[11px] mono">{STUDIO_RECORDING.duration}</span>
                  </div>
                  <div className="absolute bottom-0 left-0 right-0 h-1 bg-white/10">
                    <div className="h-full bg-primary" style={{width:"18%"}}/>
                  </div>
                </div>
                <div className="px-4 py-3 border-t border-border flex items-center gap-2">
                  <div className="flex-1 min-w-0">
                    <div className="text-[13px] font-semibold text-ink truncate">{STUDIO_RECORDING.guest}</div>
                    <div className="text-[11px] text-ink-3 mono">{STUDIO_RECORDING.id} · {STUDIO_RECORDING.duration}</div>
                  </div>
                </div>
              </div>

              {/* Brief Context */}
              {STUDIO_RECORDING.linkedBrief ? (
                <div className="bg-white rounded-card shadow-card overflow-hidden">
                  <div className="px-4 pt-3.5 pb-2.5 border-b border-border flex items-center justify-between">
                    <div className="flex items-center gap-2">
                      <div className="w-6 h-6 rounded-[6px] grid place-items-center" style={{background:"#EDE9FF"}}>
                        <Icon d={I.brief} size={13} className="text-primary"/>
                      </div>
                      <span className="text-[13px] font-semibold text-ink">Brief Context</span>
                    </div>
                    <span className="px-2 py-0.5 rounded-pill text-[10px] font-bold" style={{background:"#D9F1E2",color:"#1E7E34"}}>Approved</span>
                  </div>
                  <div className="px-4 py-3 space-y-2.5">
                    <div>
                      <div className="text-[10px] mono uppercase tracking-[0.14em] text-ink-3 mb-0.5">Episode</div>
                      <div className="text-[12.5px] font-medium text-ink leading-snug">{STUDIO_RECORDING.linkedBrief.episode}</div>
                    </div>
                    <div className="grid grid-cols-2 gap-3">
                      <div>
                        <div className="text-[10px] mono uppercase tracking-[0.14em] text-ink-3 mb-0.5">Segment</div>
                        <div className="text-[12px] text-ink">{STUDIO_RECORDING.linkedBrief.segment}</div>
                      </div>
                      <div>
                        <div className="text-[10px] mono uppercase tracking-[0.14em] text-ink-3 mb-0.5">Brief ID</div>
                        <div className="text-[12px] mono text-ink">{STUDIO_RECORDING.linkedBrief.id}</div>
                      </div>
                    </div>
                    <div>
                      <div className="text-[10px] mono uppercase tracking-[0.14em] text-ink-3 mb-0.5">Brand Voice</div>
                      <div className="flex items-center gap-1.5">
                        <Icon d={I.voice} size={12} className="text-primary"/>
                        <span className="text-[12px] font-medium text-ink">{STUDIO_RECORDING.linkedBrief.brandVoice}</span>
                      </div>
                    </div>
                    <div className="pt-1 border-t border-border">
                      <div className="text-[10px] mono uppercase tracking-[0.14em] text-ink-3 mb-1">Episode Hook</div>
                      <div className="text-[12px] text-ink-2 leading-relaxed italic">"{STUDIO_RECORDING.linkedBrief.hook}"</div>
                    </div>
                    <a href="../BriefDetail.html" className="inline-flex items-center gap-1.5 text-[11.5px] font-medium text-primary hover:text-primary-hover transition">
                      View full brief<Icon d={I.chevR} size={11}/>
                    </a>
                  </div>
                </div>
              ) : (
                <div className="bg-white rounded-card shadow-card px-4 py-4 flex items-start gap-3">
                  <div className="w-8 h-8 rounded-input grid place-items-center shrink-0" style={{background:"#FFE9C0"}}>
                    <Icon d={I.brief} size={15} className="text-[#A86A00]"/>
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-[12.5px] font-semibold text-ink mb-0.5">No brief linked</div>
                    <div className="text-[11.5px] text-ink-2 leading-snug">Link an approved brief before generating clips for best results.</div>
                    <a href="../BriefList.html" className="inline-flex items-center gap-1 mt-2 text-[11.5px] font-medium text-primary hover:text-primary-hover transition">
                      Link a brief<Icon d={I.chevR} size={11}/>
                    </a>
                  </div>
                </div>
              )}

              {/* Generate Clips */}
              <div className="bg-white rounded-card shadow-card p-5 space-y-6">
                <div>
                  <h2 className="text-[16px] font-bold display">Generate Clips</h2>
                  <p className="text-[12px] text-ink-2 mt-0.5">AI-powered clip extraction from your recording</p>
                </div>

                {/* Layout selector */}
                <div>
                  <div className="text-[11px] mono uppercase tracking-[0.15em] text-ink-3 mb-3">Layout</div>
                  <div className="grid grid-cols-3 gap-2">
                    {LAYOUTS.map(l => {
                      const active = layout === l.id;
                      return (
                        <button key={l.id} onClick={()=>setLayout(l.id)}
                          className={["rounded-card border-2 py-3 px-2 text-center transition",
                            active?"border-primary bg-primary-soft":"border-border hover:border-ink-3 bg-white"].join(" ")}>
                          {l.preview(active)}
                          <div className={`text-[12.5px] font-semibold ${active?"text-primary":"text-ink"}`}>{l.label}</div>
                          <div className="text-[10.5px] text-ink-3 mt-0.5">{l.desc}</div>
                          {l.id==="Split"&&<div className="text-[9.5px] font-bold text-warning mt-1">Default</div>}
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Clip size */}
                <div>
                  <div className="text-[11px] mono uppercase tracking-[0.15em] text-ink-3 mb-3">Clip Size</div>
                  <div className="grid grid-cols-2 gap-3">
                    {[
                      { id:"Shorts", label:"Shorts", duration:"1–1.5 min", platform:"TikTok · Reels · YouTube Shorts" },
                      { id:"Clips",  label:"Clips",  duration:"10–15 min", platform:"YouTube · Podcast clips" },
                    ].map(s => {
                      const active = clipSize === s.id;
                      return (
                        <button key={s.id} onClick={()=>setClipSize(s.id)}
                          className={["rounded-card border-2 p-4 text-left transition",
                            active?"border-primary bg-primary-soft":"border-border hover:border-ink-3 bg-white"].join(" ")}>
                          <div className={`text-[14px] font-bold ${active?"text-primary":"text-ink"}`}>{s.label}</div>
                          <div className={`text-[12px] font-semibold mt-1 ${active?"text-primary/70":"text-ink-2"}`}>{s.duration}</div>
                          <div className="text-[10.5px] text-ink-3 mt-2 leading-relaxed">{s.platform}</div>
                        </button>
                      );
                    })}
                  </div>
                </div>

                {/* Clip prompt */}
                <div>
                  <div className="text-[11px] mono uppercase tracking-[0.15em] text-ink-3 mb-2">Instructions <span className="normal-case tracking-normal font-normal text-ink-3 ml-1">(optional)</span></div>
                  <div className="relative">
                    <textarea
                      value={clipPrompt}
                      onChange={e => setClipPrompt(e.target.value.slice(0, 280))}
                      rows={3}
                      placeholder="e.g. Find moments where Alex talks about procurement failure. Prioritise punchy one-liners. Avoid the intro."
                      className="w-full px-3 py-2.5 rounded-input border border-border text-[12.5px] leading-relaxed bg-white resize-none focus:outline-none focus:border-primary focus:shadow-[0_0_0_3px_rgba(107,78,255,0.15)] transition placeholder:text-ink-3"
                    />
                    <div className="absolute bottom-2 right-2.5 text-[10px] mono text-ink-3">{clipPrompt.length}/280</div>
                  </div>
                  <div className="flex flex-wrap gap-1.5 mt-2">
                    {["Best one-liners","Guest story moments","Controversial takes","Data-backed claims"].map(s=>(
                      <button key={s} onClick={()=>setClipPrompt(v=>v?v+", "+s:s)}
                        className="px-2 py-0.5 rounded-pill text-[10.5px] font-medium border border-border text-ink-2 hover:border-primary hover:text-primary hover:bg-primary-soft transition">
                        + {s}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Generate button */}
                <button onClick={generateMore} disabled={generating}
                  className={["w-full h-13 rounded-pill text-[14px] font-semibold transition inline-flex items-center justify-center gap-2.5",
                    generating
                      ? "bg-border text-ink-3 cursor-not-allowed"
                      : "bg-primary hover:bg-primary-hover text-white shadow-[0_8px_20px_-6px_rgba(107,78,255,0.6)]"].join(" ")}
                  style={{height:52}}>
                  {generating ? (
                    <><Icon d={I.refresh2} size={17} className="animate-spin"/>Generating clips…</>
                  ) : (
                    <><Icon d={I.scissors} size={17}/>Generate {clipSize}</>
                  )}
                </button>
              </div>

              <div className="text-[11px] text-ink-3 mono">podium · studio · {STUDIO_RECORDING.id}</div>
            </div>

            {/* Right: Transcript + Clips */}
            <div className="flex-1 min-w-0 space-y-6">

              {/* Transcript */}
              <div className="bg-white rounded-card shadow-card overflow-hidden">
                <div className="px-5 pt-4 pb-3.5 border-b border-border flex items-center justify-between">
                  <div>
                    <h2 className="text-[15px] font-semibold display">Transcript</h2>
                    <p className="text-[12px] text-ink-2 mt-0.5">Auto-generated · Riverside.fm · {STUDIO_RECORDING.duration}</p>
                  </div>
                  <span className="px-2.5 py-1 rounded-pill text-[10.5px] font-semibold" style={{background:"#D9F1E2",color:"#1E7E34"}}>Ready</span>
                </div>
                <div className="overflow-y-auto px-5 py-5 space-y-5" style={{maxHeight:360}}>
                  {TRANSCRIPT.map((entry, i) => (
                    <div key={i} className="flex gap-3">
                      <div className="shrink-0 pt-0.5">
                        <span className="mono text-[10.5px] text-ink-3">{entry.time}</span>
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className={`text-[11px] font-bold uppercase tracking-[0.1em] mb-1 ${entry.speaker==="HOST"?"text-ink-3":"text-primary"}`}>
                          {entry.speaker}
                        </div>
                        <p className="text-[13.5px] text-ink leading-relaxed">{entry.text}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Generated clips */}
              <div>
                <div className="flex items-center justify-between mb-4">
                  <div>
                    <h2 className="text-[18px] font-bold display">Generated Clips</h2>
                    <p className="text-[12.5px] text-ink-2 mt-0.5">{clips.length} clips · {clipSize} · {layout} layout · saved state</p>
                  </div>
                  {clips.length > 0 && (
                    <button onClick={generateMore} disabled={generating}
                      className={["h-10 px-5 rounded-pill border text-[13px] font-medium inline-flex items-center gap-2 transition",
                        generating?"border-border text-ink-3 cursor-not-allowed":"border-border text-ink-2 hover:text-ink hover:border-ink-3 bg-white"].join(" ")}>
                      <Icon d={I.refresh2} size={14}/>Generate More
                    </button>
                  )}
                </div>

                {clips.length === 0 ? (
                  <div className="bg-white rounded-card shadow-card px-8 py-14 text-center">
                    <div className="w-14 h-14 rounded-full bg-lavender grid place-items-center mx-auto mb-4">
                      <Icon d={I.scissors} size={22} className="text-ink-3"/>
                    </div>
                    <div className="text-[15px] font-semibold text-ink mb-1">No clips generated yet</div>
                    <div className="text-[13px] text-ink-2">Configure your clip settings on the left and click Generate.</div>
                  </div>
                ) : (
                  <div className="grid grid-cols-3 gap-4">
                    {clips.map(clip=><ClipCard key={clip.id} clip={clip}/>)}
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  );
};

function App(){
  return (
    <div className="h-screen w-screen flex" data-screen-label="Studio">
      <Sidebar active="studio"/>
      <div className="flex-1 min-w-0 flex flex-col"><StudioPage/></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
