<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podium AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    iframe { width: 100%; height: 100vh; border: none; display: block; }
  </style>
</head>
<body>
  <iframe id="frame"></iframe>
  <script>
    const DEFAULT = 'screens/Login.html';
    const frame = document.getElementById('frame');

    // Restore last visited page from localStorage, fallback to default
    frame.src = localStorage.getItem('podium_page') || DEFAULT;

    // Each screen page posts its filename via postMessage — save it here
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'podium_navigate') {
        localStorage.setItem('podium_page', e.data.page);
      }
    });
  </script>
</body>
</html>
