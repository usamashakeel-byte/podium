  upload:<><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M17 8l-5-5-5 5M12 3v12"/></>,

const Logo=()=>(<a href="CMDashboard.html" className="flex items-center gap-2.5 hover:opacity-90 transition"><div className="relative w-10 h-10 rounded-[11px] overflow-hidden" style={{background:"#1A1A2E"}}><svg viewBox="0 0 40 40" width="40" height="40" fill="none"><rect width="40" height="40" rx="11" fill="#1A1A2E"/><rect x="16" y="8" width="8" height="15" rx="4" fill="#FFFFFF"/><path d="M11 19a9 9 0 0018 0" stroke="#FFFFFF" strokeWidth="2.5" strokeLinecap="round" fill="none"/><path d="M20 28v4" stroke="#FFFFFF" strokeWidth="2.5" strokeLinecap="round"/><path d="M16 32h8" stroke="#FFFFFF" strokeWidth="2.5" strokeLinecap="round"/></svg></div><div className="text-[20px] tracking-[-0.02em] text-ink" style={{fontWeight:700}}>Podium AI<span style={{color:"#6B4EFF"}}>.</span></div></a>);

const tintFor=n=>{if((n||"").trim()==="Fizza Asad")return TINTS[0];let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))>>>0;return TINTS[h%TINTS.length]};
const Avatar=({name,size=32})=>{const t=tintFor(name);return <span className="inline-flex items-center justify-center font-semibold rounded-full shrink-0" style={{width:size,height:size,background:t.bg,color:t.fg,fontSize:size<=32?11:13,letterSpacing:"0.02em"}}>{name.split(/\s+/).filter(Boolean).slice(0,2).map(s=>s[0]).join("").toUpperCase()}</span>};
const RoleBadge=()=><span className="inline-flex items-center gap-1.5 rounded-pill font-medium px-2.5 py-1 text-[11.5px]" style={{background:"#EDE9FF",color:"#5A3FE0"}}><span className="w-1.5 h-1.5 rounded-full bg-primary"/>Content Marketer</span>;
const NavItem=({icon,label,active,href})=>(<a href={href} className={["relative w-full flex items-center gap-3 px-3 py-2 rounded-input text-[13px] transition",active?"bg-primary-soft text-primary font-medium":"text-ink-2 hover:bg-lavender hover:text-ink"].join(" ")}>{active&&<span className="absolute left-0 top-1.5 bottom-1.5 w-[3px] rounded-full bg-primary"/>}<Icon d={icon} size={16}/><span className="flex-1 text-left">{label}</span></a>);
const SectionLabel=({children})=>(<div className="text-[10px] mono uppercase tracking-[0.18em] text-ink-3 px-3 mt-5 mb-2">{children}</div>);

const Crumb=({items})=>(<nav className="flex items-center gap-1.5 text-[13px]">{items.map((it,i)=>(<React.Fragment key={i}>{i>0&&<Icon d={I.chevR} size={14} className="text-ink-3"/>}<span className={i===items.length-1?"text-ink font-medium":"text-ink-2 hover:text-ink cursor-pointer"}>{it}</span></React.Fragment>))}</nav>);
const Topbar=({breadcrumb})=>(<header className="h-[64px] bg-white border-b border-border flex items-center px-8 gap-4 shrink-0"><div className="flex-1 min-w-0"><Crumb items={breadcrumb}/></div><button className="w-9 h-9 rounded-input grid place-items-center text-ink-2 hover:bg-lavender hover:text-ink"><Icon d={I.bell} size={18}/></button><RoleBadge/></header>);
</script>

<script type="text/babel">

const STATUS_STYLE={Pending:{bg:"#FFE9C0",fg:"#A86A00"},Approved:{bg:"#D9F1E2",fg:"#1E7E34"},Rejected:{bg:"#FFE0DA",fg:"#B92E22"}};

const AI_RECOMMENDATION = {
  confidence:94,
  guestPersonas:[
    {
      fit:95,

const FitIcon=({fit})=>{
  const fc=fitColor(fit);
  return (
    <span className="inline-flex items-center justify-center rounded-input shrink-0" style={{width:38,height:38,background:fc.bg}}>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={fc.fg} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
    </span>
  );

const FitBadge=({score})=>{
  const fc=fitColor(score);
  return <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-pill text-[11px] font-bold shrink-0" style={{background:fc.bg,color:fc.fg}}><span className="w-1.5 h-1.5 rounded-full" style={{background:fc.bar}}/>{score}% fit</span>;
};

const FitMeter=({score})=>{
  const fc=fitColor(score);
  return (
    <div className="h-1.5 bg-lavender rounded-full overflow-hidden">
      <div className="h-full rounded-full" style={{width:score+"%",background:fc.bar}}/>
    </div>
  );

const SignalList=({items})=>(
  <div className="flex flex-wrap gap-1.5">
    {items.map(item=>(
      <span key={item} className="text-[10.5px] px-2.5 py-1 rounded-pill bg-lavender text-ink-2 font-medium">{item}</span>
    ))}
  </div>
);

const DetailPoint=({children})=>(
  <li className="flex gap-2 text-[12.5px] text-ink-2 leading-relaxed">
    <Icon d={I.check} size={13} stroke={2.4} className="text-success shrink-0 mt-0.5"/>
    <span>{children}</span>

);

  <button type="button" onClick={onClick}

    <Icon d={I.refresh} size={13}/>Regenerate

);

  <section className="recommendation-card bg-white rounded-card shadow-card border border-transparent overflow-hidden">
    <div className="px-5 py-4 border-b border-border">
      <div className="flex items-start gap-3">

        <div className="flex flex-col items-end gap-2 shrink-0">

        <input type="file" className="hidden" accept=".pdf,.doc,.docx,.txt" onChange={e=>onFile(e.target.files?.[0]?.name||"")}/>
        <div className="flex items-center gap-3">
          <span className="w-9 h-9 rounded-input bg-white grid place-items-center text-primary shrink-0"><Icon d={I.upload} size={16}/></span>
          <div className="min-w-0">
            <div className="text-[13px] font-semibold text-ink">{fileName||"Upload host bio, profile, or notes"}</div>
            <div className="text-[11.5px] text-ink-2 mt-0.5">PDF, DOC, DOCX, or TXT. You can also fill the fields manually.</div>
          </div>
        </div>
      </label>
      <div className="grid grid-cols-2 gap-3">
        <GuestField label="Host Name" value={form.name} onChange={v=>onChange("name",v)} placeholder="e.g. Aisha Khan"/>
        <GuestField label="Host Role" value={form.role} onChange={v=>onChange("role",v)} placeholder="e.g. Executive host"/>
      </div>
      <GuestField label="Tone" value={form.tone} onChange={v=>onChange("tone",v)} placeholder="e.g. Strategic, warm, commercially sharp"/>
      <div>
        <label className="text-[10px] mono uppercase tracking-[0.12em] text-ink-3 mb-2 block">Expertise / fit notes</label>
        <textarea value={form.expertise} onChange={e=>onChange("expertise",e.target.value)} rows={3}
          placeholder="What topics should this host cover?"
          className="w-full px-3.5 py-3 rounded-input border border-border text-[13px] bg-white placeholder:text-ink-3 leading-relaxed"/>
      </div>
      <div className="flex items-center justify-between gap-3 pt-1">
        <a href="Hosts.html" className="text-[12px] font-medium text-ink-2 hover:text-primary transition">Manage all hosts in Configuration</a>
        <button onClick={onSave} disabled={!form.name.trim()}
          className="h-9 px-4 rounded-pill bg-primary hover:bg-primary-hover disabled:bg-border disabled:text-ink-3 disabled:cursor-not-allowed text-white text-[12.5px] font-semibold inline-flex items-center gap-1.5 transition">
          <Icon d={I.check} size={13} stroke={2.5}/>Use this host
        </button>
      </div>
    </div>
  </section>
);

const HostMissingState=({onUpload})=>(
  <section className="bg-white rounded-card shadow-card border border-[#DCD3FF] overflow-hidden">
    <div className="px-5 py-5">
      <div className="w-10 h-10 rounded-input bg-primary-soft grid place-items-center text-primary mb-4"><Icon d={I.user} size={18}/></div>
      <div className="mono text-[10.5px] uppercase tracking-[0.14em] text-ink-3 mb-1">Configured host fit</div>
      <h2 className="text-[18px] font-semibold text-ink display">No host configured yet</h2>
      <p className="text-[13px] text-ink-2 leading-relaxed mt-2">Add or upload a host profile so an interviewer can be selected before generating the brief.</p>
      <div className="flex items-center gap-2 mt-5">
        <button onClick={onUpload} className="h-9 px-4 rounded-pill bg-primary hover:bg-primary-hover text-white text-[12.5px] font-semibold inline-flex items-center gap-1.5 transition">
          <Icon d={I.upload} size={13}/>Upload host
        </button>
        <a href="Hosts.html" className="h-9 px-4 rounded-pill text-[12.5px] font-medium bg-ink text-white hover:bg-primary transition inline-flex items-center">Open Hosts</a>
      </div>
    </div>
  </section>
);

const GuestField=({label,value,onChange,placeholder,type="text"})=>(
  <div>
    <label className="text-[10px] mono uppercase tracking-[0.12em] text-ink-3 mb-2 block">{label}</label>
    <input type={type} aria-label={label} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      className="w-full h-11 px-3.5 rounded-input border border-border text-[13px] bg-white placeholder:text-ink-3"/>
  </div>
);

const GuestTextArea=({label,value,onChange,placeholder,rows=4})=>(
  <div>
    <label className="text-[10px] mono uppercase tracking-[0.12em] text-ink-3 mb-2 block">{label}</label>
    <textarea aria-label={label} value={value} onChange={e=>onChange(e.target.value)} rows={rows} placeholder={placeholder}
      className="w-full px-3.5 py-3 rounded-input border border-border text-[13px] bg-white placeholder:text-ink-3 leading-relaxed resize-none"/>
  </div>
);

const GuestProfilePhoto=({name,photo,onChange})=>{
  const handleFile=file=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=event=>onChange(event.target.result);
    reader.readAsDataURL(file);
  };
  return (
    <div>
      <label className="text-[10px] mono uppercase tracking-[0.12em] text-ink-3 mb-2 block">Profile picture</label>
      <div className="rounded-input border border-border bg-lavender/40 px-3.5 py-3 flex items-center gap-3">
        <div className="w-14 h-14 rounded-full overflow-hidden bg-white border border-border shrink-0 grid place-items-center">
          {photo ? (
            <img src={photo} alt="Guest profile preview" className="w-full h-full object-cover"/>
          ) : (
            <Avatar name={name||"Guest"} size={54}/>
          )}
        </div>
        <div className="min-w-0 flex-1">
          <div className="text-[13px] font-semibold text-ink">{photo ? "Profile photo added" : "Add a guest photo"}</div>
          <div className="text-[11.5px] text-ink-2 mt-0.5">Used in brief prep and guest-facing materials.</div>
        </div>
        <label className="h-8 px-3 rounded-pill bg-white border border-border text-[12px] font-medium text-ink-2 hover:text-primary hover:border-primary/40 transition inline-flex items-center cursor-pointer shrink-0">
          Upload
          <input type="file" className="hidden" accept="image/*" onChange={e=>handleFile(e.target.files?.[0])}/>
        </label>
      </div>
    </div>
  );
};

const EpisodeDetailPage=()=>{
  const ss=STATUS_STYLE[EPISODE.status];
  const [guestIndex,setGuestIndex]=useState(0);
  const [hostIndex,setHostIndex]=useState(0);
  const [uploadedHost,setUploadedHost]=useState(null);
  const [hostUploadOpen,setHostUploadOpen]=useState(false);
  const [hostUpload,setHostUpload]=useState(EMPTY_HOST_UPLOAD);
  const [hostFileName,setHostFileName]=useState("");
  const guest=AI_RECOMMENDATION.guestPersonas[guestIndex];
  const hostOptions=uploadedHost?[uploadedHost,...AI_RECOMMENDATION.hosts]:AI_RECOMMENDATION.hosts;
  const host=hostOptions[hostIndex]||null;
  const nextGuest=AI_RECOMMENDATION.guestPersonas[(guestIndex+1)%AI_RECOMMENDATION.guestPersonas.length];
  const nextHost=hostOptions.length?hostOptions[(hostIndex+1)%hostOptions.length]:null;
  const [actualGuest,setActualGuest]=useState({
    name:"",
    title:AI_RECOMMENDATION.guestPersonas[0].defaultTitle,
    company:"",
    linkedin:"",
    email:"",
    photo:"",
    bio:"",
  });
  const setGuestField=key=>value=>setActualGuest(prev=>({...prev,[key]:value}));
  const guestReady=actualGuest.name.trim()&&actualGuest.company.trim();
  const regenerateGuest=()=>{
    setGuestIndex(prev=>{
      const next=(prev+1)%AI_RECOMMENDATION.guestPersonas.length;
      const nextCandidate=AI_RECOMMENDATION.guestPersonas[next];
      setActualGuest(form=>({...form,title:nextCandidate.defaultTitle}));
      return next;
    });
  };
  const regenerateHost=()=>setHostIndex(prev=>hostOptions.length?(prev+1)%hostOptions.length:0);
  const setHostUploadField=(key,value)=>setHostUpload(prev=>({...prev,[key]:value}));
  const saveUploadedHost=()=>{
    const name=hostUpload.name.trim();
    if(!name)return;
    const newHost={
      fit:84,
      name,
      role:hostUpload.role.trim()||"Uploaded host",
      tone:hostUpload.tone.trim()||"Profile uploaded",
      why:`${name} was added from ${hostFileName?"an uploaded profile":"episode setup"} and selected for this brief. Their expertise, tone, and fit notes can now inform host framing.`,
      strengths:[
        hostUpload.expertise.trim()||"Newly added host profile available for AI matching",
        hostFileName?`Profile source attached: ${hostFileName}`:"Manual host details added from episode setup",
        "Can be refined later under Configuration > Hosts",
      ],
    };
    setUploadedHost(newHost);
    setHostIndex(0);
    setHostUpload(EMPTY_HOST_UPLOAD);
    setHostFileName("");
    setHostUploadOpen(false);
  };

  return (
    <div className="h-full flex flex-col bg-lavender">
      <Topbar breadcrumb={["Workspace","Episode Topics",EPISODE.id+" · AI Recommendation"]}/>

      <div className="bg-white border-b border-border shrink-0">
        <div className="px-8 h-11 flex items-center gap-5 text-[12.5px] overflow-x-auto">
          <a href="EpisodeTopics.html" className="inline-flex items-center gap-1 text-ink-2 hover:text-ink transition shrink-0">
            <Icon d={I.chevL} size={14}/>Back to Episodes
          </a>
          <span className="w-px h-4 bg-border shrink-0"/>
          <div className="flex items-baseline gap-2 shrink-0"><span className="mono text-[10px] uppercase tracking-[0.14em] text-ink-3">Episode</span><span className="font-medium text-ink mono">{EPISODE.id} · Ep {EPISODE.num} of {EPISODE.total}</span></div>
          <span className="w-px h-4 bg-border shrink-0"/>
          <div className="flex items-baseline gap-2 min-w-0"><span className="mono text-[10px] uppercase tracking-[0.14em] text-ink-3">Topic</span><span className="font-medium text-ink truncate max-w-[300px]">{EPISODE.topic}</span></div>
          <span className="w-px h-4 bg-border shrink-0"/>
          <div className="flex items-baseline gap-2 shrink-0"><span className="mono text-[10px] uppercase tracking-[0.14em] text-ink-3">Segment</span><span className="font-medium" style={{color:"#6B4EFF"}}>{EPISODE.segment}</span></div>
          <span className="w-px h-4 bg-border shrink-0"/>
          <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-pill text-[11px] font-semibold shrink-0" style={{background:ss.bg,color:ss.fg}}>{EPISODE.status}</span>
        </div>
      </div>

      <main className="flex-1 overflow-y-auto">
        <div className="max-w-[1180px] mx-auto px-8 py-8">
          <section className="bg-white rounded-card shadow-card px-5 py-4 mb-5">
            <div className="flex items-start gap-3">
              <div className="w-9 h-9 rounded-[10px] bg-primary-soft grid place-items-center shrink-0">
                <Icon d={I.sparkle} size={17} className="text-primary"/>
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2 mb-1">
                  <div className="mono text-[10.5px] uppercase tracking-[0.16em] text-ink-3">Podium Recommendation</div>
                  <span className="text-[10.5px] px-2 py-0.5 rounded-pill bg-primary-soft text-primary font-semibold">{AI_RECOMMENDATION.confidence}% confidence</span>
                </div>
                <h1 className="text-[24px] font-bold display leading-tight">{EPISODE.title}</h1>
                <p className="text-[13px] text-ink-2 mt-1.5 max-w-[760px] leading-relaxed">
                  AI selected one guest persona and one host fit for this episode. If the host has not been added yet, upload a host profile here or add one under Configuration before generating the brief.
                </p>
              </div>
              <span className="hidden md:inline-flex items-center gap-1.5 rounded-pill px-3 py-1.5 text-[11.5px] font-semibold" style={{background:"#D9F1E2",color:"#1E7E34"}}>
                <Icon d={I.check} size={13} stroke={2.4}/>Ready for brief
              </span>
            </div>
          </section>

          <div className="grid lg:grid-cols-[minmax(0,1fr)_460px] gap-5 items-start">
            <div className="space-y-5 min-w-0">
              <RecommendationCard
                label="AI-selected guest persona"
                title={guest.title}
                sub={guest.companyType}
                score={guest.fit}
                optionText={`Option ${guestIndex+1} of ${AI_RECOMMENDATION.guestPersonas.length}`}
                action={<RegenerateButton onClick={regenerateGuest}/>}
                nextText={`Next option if unavailable: ${nextGuest.title} (${nextGuest.fit}% fit)`}
              >
                <p className="text-[13px] text-ink-2 leading-relaxed">{guest.why}</p>
                <div className="mt-4">
                  <div className="mono text-[10px] uppercase tracking-[0.14em] text-ink-3 mb-2">Selection signals</div>
                  <SignalList items={guest.signals}/>
                </div>
                <div className="mt-5 pt-4 border-t border-border">
                  <div className="text-[13px] font-semibold text-ink mb-2">How this guest shapes the brief</div>
                  <ul className="space-y-2">
                    {guest.interviewAngles.map(angle=><DetailPoint key={angle}>{angle}</DetailPoint>)}
                  </ul>
                </div>
              </RecommendationCard>

              {host ? (
                <RecommendationCard
                  label={uploadedHost&&hostIndex===0?"Uploaded host fit":"Configured host fit"}
                  title={host.name}
                  sub={`${host.role} · ${host.tone}`}
                  score={host.fit}
                  icon={<Avatar name={host.name} size={38}/>}
                  optionText={`Option ${hostIndex+1} of ${hostOptions.length}`}
                  action={<div className="flex flex-col items-end gap-2"><RegenerateButton onClick={regenerateHost}/></div>}
                  nextText={nextHost&&hostOptions.length>1?`Next option if unavailable: ${nextHost.name} (${nextHost.fit}% fit)`:"Add more hosts in Configuration to unlock alternatives"}
                >
                  <p className="text-[13px] text-ink-2 leading-relaxed">{host.why}</p>
                  <div className="mt-4 rounded-input bg-lavender px-3.5 py-3">
                    <div className="mono text-[10px] uppercase tracking-[0.14em] text-ink-3 mb-2">{uploadedHost&&hostIndex===0?"Why this uploaded host works":"Why this host from app configuration"}</div>
                    <ul className="space-y-2">
                      {host.strengths.map(item=><DetailPoint key={item}>{item}</DetailPoint>)}
                    </ul>
                  </div>
                  <div className="mt-4 pt-4 border-t border-border flex items-center justify-between gap-3">
                    <div className="text-[12px] text-ink-2">Host missing from configuration?</div>
                    <a href="Hosts.html" className="h-8 px-3 rounded-pill text-[12px] font-medium bg-ink text-white hover:bg-primary transition inline-flex items-center">Open Hosts</a>
                  </div>
                </RecommendationCard>
              ) : (
                <HostMissingState onUpload={()=>setHostUploadOpen(true)}/>
              )}

              {hostUploadOpen&&(
                <HostUploadPanel
                  form={hostUpload}
                  fileName={hostFileName}
                  onChange={setHostUploadField}
                  onFile={setHostFileName}
                  onCancel={()=>setHostUploadOpen(false)}
                  onSave={saveUploadedHost}
                />
              )}
            </div>

            <aside className="bg-white rounded-card shadow-card overflow-hidden sticky top-6">
              <div className="px-6 py-5 border-b border-border">
                <div className="flex items-start justify-between gap-3 mb-3.5">
                  <div>
                    <div className="mono text-[10.5px] uppercase tracking-[0.14em] text-ink-3 mb-1">Add guest details</div>
                    <h3 className="text-[17px] font-semibold text-ink display">Actual guest</h3>
                  </div>
                  <span className="text-[10.5px] px-2 py-0.5 rounded-pill bg-lavender text-ink-2 font-semibold">Required</span>
                </div>
                <p className="text-[13px] text-ink-2 leading-relaxed">Add the real person who matches the selected persona. The AI will use these details when generating the brief.</p>
              </div>
              <div className="px-6 py-5">
                <div className="space-y-4">
                  <GuestProfilePhoto name={actualGuest.name} photo={actualGuest.photo} onChange={setGuestField("photo")}/>
                  <GuestField label="Full Name" value={actualGuest.name} onChange={setGuestField("name")} placeholder="e.g. Alex Morgan"/>
                  <GuestField label="Job Title" value={actualGuest.title} onChange={setGuestField("title")} placeholder={guest.defaultTitle}/>
                  <GuestField label="Company" value={actualGuest.company} onChange={setGuestField("company")} placeholder="e.g. Lattice"/>
                  <div className="grid grid-cols-2 gap-3">
                    <GuestField label="LinkedIn" value={actualGuest.linkedin} onChange={setGuestField("linkedin")} placeholder="linkedin.com/in/..."/>
                    <GuestField label="Email" value={actualGuest.email} onChange={setGuestField("email")} placeholder="name@company.com" type="email"/>
                  </div>
                  <GuestTextArea label="Bio" value={actualGuest.bio} onChange={setGuestField("bio")} rows={4}
                    placeholder="Short guest bio, credibility notes, or context the host should know before recording."/>
                </div>
              </div>
              <PackageSummary guest={guest} host={host}/>
              <div className="px-6 py-5 border-t border-border">
                {guestReady && host ? (
                  <a href="BriefDetail.html"
                    className="w-full h-11 rounded-pill bg-primary hover:bg-primary-hover text-white text-[13.5px] font-semibold transition inline-flex items-center justify-center gap-2 shadow-[0_6px_14px_-4px_rgba(107,78,255,0.55)]">
                    <Icon d={I.lock} size={15}/>Lock Guest and Generate Brief
                  </a>
                ) : (
                  <button disabled
                    className="w-full h-11 rounded-pill bg-border text-ink-3 text-[13.5px] font-semibold inline-flex items-center justify-center gap-2 cursor-not-allowed">
                    <Icon d={I.lock} size={15}/>Lock Guest and Generate Brief
                  </button>
                )}
                <div className="mt-3 flex items-center gap-2 text-[11.5px] text-ink-3 leading-snug">
                  <Icon d={I.check} size={13} stroke={2.5} className="text-success shrink-0"/>
                  Host comes from Configuration or an uploaded profile. Guest details anchor the AI persona to the real invitee.
                </div>
              </div>
            </aside>
          </div>

          <section className="mt-5 bg-white rounded-card shadow-card px-5 py-4">
            <div className="mono text-[10.5px] uppercase tracking-[0.14em] text-ink-3 mb-3">AI inputs used for this decision</div>
            <div className="grid md:grid-cols-4 gap-3">
              {[
                {label:"Episode",value:EPISODE.id+" · Ep "+EPISODE.num+" of "+EPISODE.total},
                {label:"Segment",value:EPISODE.segment},
                {label:"Target Title",value:"CIO / Head of AI"},
                {label:"Company Size",value:"50-500 employees"},
              ].map(item=>(
                <div key={item.label} className="px-3 py-2.5 rounded-input bg-lavender">
                  <div className="text-[10px] mono uppercase tracking-[0.12em] text-ink-3 mb-1">{item.label}</div>
                  <div className="font-semibold text-ink text-[13px] leading-snug">{item.value}</div>
                </div>
              ))}
            </div>
          </section>

          <div className="text-[11px] text-ink-3 mono mt-8">podium · episode topics · {EPISODE.id} · ai recommendation</div>
        </div>
      </main>
    </div>
  );
};

function App(){
  return (
    <div className="h-screen w-screen flex" data-screen-label="Episode Detail">
      <Sidebar active="episodes"/>
      <div className="flex-1 min-w-0 flex flex-col"><EpisodeDetailPage/></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>window.parent.postMessage({type:'podium_navigate',page:'screens/EpisodeDetail.html'},'*');</script></body>
</html>
