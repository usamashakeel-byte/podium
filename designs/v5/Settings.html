<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Podium AI — Settings · User management</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          lavender: '#EEEEF8',
          surface: '#FFFFFF',
          primary: '#6B4EFF',
          'primary-hover': '#5A3FE0',
          'primary-soft': '#EDE9FF',
          success: '#34A853',
          warning: '#F9AB00',
          danger: '#EA4335',
          info: '#2A6FDB',
          ink: '#1A1A2E',
          'ink-2': '#5F6368',
          'ink-3': '#ADADBE',
          border: '#E2E2EE',
        },
        fontFamily: {
          sans: ['Inter', 'system-ui', 'sans-serif'],
                  },
        boxShadow: {

          cardHover: '0 4px 8px rgba(26,26,46,0.06), 0 12px 28px rgba(107,78,255,0.10)',
        },
        borderRadius: { card: '12px', input: '8px', pill: '24px' },
      }
    }
  }
</script>
<style>
  html, body, #root { height: 100%; }
  body { font-family: 'Inter', sans-serif; color:#1A1A2E; background:#EEEEF8; }
  .mono{font-family:'Inter',sans-serif}
  .display { letter-spacing:-0.02em; }
  .card-hover:hover { box-shadow: 0 4px 8px rgba(26,26,46,0.06), 0 12px 28px rgba(107,78,255,0.10); transition: all .18s ease; }
  .card-hover { transition: all .18s ease; }
  input:focus, select:focus { outline:none; border-color:#6B4EFF !important; box-shadow:0 0 0 4px rgba(107,78,255,0.18); }
  /* Row hover */
  tr.row-hover:hover { background:#FAFAFE; }
  /* Sticky table head shadow on scroll (optional) */
  thead th { position:sticky; top:0; background:#FAFAFE; z-index:1; }

</head>
<body>
<div id="root"></div>

<script type="text/babel">
// shell.jsx — shared Podium AI app chrome
// Exposes: Sidebar, Topbar, Avatar, RoleBadge, Logo, Icon, PodiumIcons
// All globals via window assignment at the bottom.

// ─────────────────────────────────────────────────────────────────
// ICONS — inline SVGs (stroke 1.75, matches Lucide visual weight)
// ─────────────────────────────────────────────────────────────────
const Icon = ({ d, size = 18, stroke = 1.75, className = "", fill }) => (
  <svg
    width={size} height={size}
    viewBox="0 0 24 24"
    fill={fill || "none"}
    stroke="currentColor" strokeWidth={stroke}
    strokeLinecap="round" strokeLinejoin="round"
    className={className}
  >
    {d}
  </svg>
);

const PodiumIcons = {

  // workspace nav
  ideation: <path d="M9 18h6M10 21h4M12 3a6 6 0 014 10.5c-.7.7-1 1.5-1 2.5H9c0-1-.3-1.8-1-2.5A6 6 0 0112 3z"/>,
  users:    <><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></>,
  brief:    <><path d="M14 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V8z"/><path d="M14 3v5h5M9 13h6M9 17h4"/></>,

  youtube:  <><rect x="2.5" y="5.5" width="19" height="13" rx="3.5"/><path d="M10.5 9.5l4.5 2.5-4.5 2.5z" fill="currentColor" stroke="none"/></>,
  audience: <><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0116 0"/></>,
  trend:    <><path d="M3 17l6-6 4 4 8-8"/><path d="M14 7h7v7"/></>,
  template: <><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></>,
  settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1.1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1.1 1.7 1.7 0 00-.3-1.8l-.1-.1A2 2 0 117 5.9l.1.1a1.7 1.7 0 001.8.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></>,
  // misc UI
  chevronRight: <path d="M9 6l6 6-6 6"/>,
  chevronDown:  <path d="M6 9l6 6 6-6"/>,
  search:       <><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></>,
  plus:         <><path d="M12 5v14M5 12h14"/></>,
  bell:         <><path d="M6 8a6 6 0 1112 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 004 0"/></>,
  more:         <><circle cx="5" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="19" cy="12" r="1.4" fill="currentColor" stroke="none"/></>,
  moreV:        <><circle cx="12" cy="5" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.4" fill="currentColor" stroke="none"/></>,
  check:        <path d="M5 12l5 5L20 7"/>,
  mic:          <><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0014 0M12 18v3M9 21h6"/></>,
  video:        <><rect x="2" y="7" width="14" height="10" rx="2"/><path d="M16 10l5-3v10l-5-3"/></>,
  share2:       <><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8-3M8.6 10.5l6.8 3"/></>,
  studio:       <><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4M10 8l5 3-5 3V8z"/></>,
  voice:    <><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></>,
  arrowDown:    <><path d="M12 5v14M19 12l-7 7-7-7"/></>,
  arrowUp:      <><path d="M12 19V5M5 12l7-7 7 7"/></>,
  clock:        <><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></>,
  filter:       <path d="M3 4h18l-7 9v7l-4-2v-5z"/>,
  sliders:      <><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3"/><path d="M1 14h6M9 8h6M17 16h6"/></>,
  edit:         <><path d="M11 4H4v16h16v-7"/><path d="M18.5 2.5a2.1 2.1 0 113 3L12 15l-4 1 1-4z"/></>,
  trash:        <><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></>,
  shield:       <><path d="M12 3l8 3v6c0 5-3.5 8.2-8 9-4.5-.8-8-4-8-9V6l8-3z"/><path d="M9 12l2 2 4-4"/></>,
  flame:        <path d="M12 3s5 4 5 9a5 5 0 11-10 0c0-2 1-3 1-3s1 2 3 2c0-3-2-4-2-7 1 1 3 0 3-1z"/>,
  rocket:       <><path d="M5 19c1-3 4-7 9-9s9-1 9-1-2 4-1 9-7 8-9 9c-2 1-4-1-4-1z"/><circle cx="14" cy="10" r="2"/></>,
};

// ─────────────────────────────────────────────────────────────────
// LOGO — refined "Wave P" mark from the Login tweaks
// ─────────────────────────────────────────────────────────────────
const Logo = ({ compact = false, href = "CMDashboard.html" }) => (
  <a href={href} className="flex items-center gap-2.5 hover:opacity-90 transition">
    <div className="relative w-10 h-10 rounded-[11px] shadow-card overflow-hidden" style={{ background: "#1A1A2E" }}>
      <svg viewBox="0 0 40 40" width="40" height="40" fill="none"><rect width="40" height="40" rx="11" fill="#1A1A2E"/><rect x="16" y="8" width="8" height="15" rx="4" fill="#FFFFFF"/><path d="M11 19a9 9 0 0018 0" stroke="#FFFFFF" strokeWidth="2.5" strokeLinecap="round" fill="none"/><path d="M20 28v4" stroke="#FFFFFF" strokeWidth="2.5" strokeLinecap="round"/><path d="M16 32h8" stroke="#FFFFFF" strokeWidth="2.5" strokeLinecap="round"/></svg>
    </div>
    {!compact && (
      <div className="text-[20px] tracking-[-0.02em] text-ink" style={{ fontWeight: 700 }}>
        Podium AI<span style={{ color: "#6B4EFF" }}>.</span>
      </div>
    )}
  </a>
);

// ─────────────────────────────────────────────────────────────────
// AVATAR — initials on a tinted disc
// ─────────────────────────────────────────────────────────────────
const AVATAR_TINTS = [
  { bg: "#6B4EFF", fg: "#FFFFFF" }, // violet
  { bg: "#FFE0DA", fg: "#B92E22" }, // coral
  { bg: "#D9F1E2", fg: "#1E7E34" }, // green
  { bg: "#FFE9C0", fg: "#A86A00" }, // amber
  { bg: "#E3DCFF", fg: "#5A3FE0" }, // soft violet
  { bg: "#1A1A2E", fg: "#FFFFFF" }, // ink
];
const tintFor = (name) => {
  if ((name || "").trim() === "Fizza Asad") return AVATAR_TINTS[0];
  let h = 0; for (const c of name) h = (h * 31 + c.charCodeAt(0)) >>> 0;
  return AVATAR_TINTS[h % AVATAR_TINTS.length];
};
const initials = (name) =>
  name.split(/\s+/).filter(Boolean).slice(0, 2).map((s) => s[0]).join("").toUpperCase();

const Avatar = ({ name, size = 32, tint }) => {
  const t = tint || tintFor(name);
  return (
    <span
      className="inline-flex items-center justify-center font-semibold rounded-full shrink-0"
      style={{
        width: size, height: size,
        background: t.bg, color: t.fg,
        fontSize: size <= 24 ? 10 : size <= 32 ? 11 : 13,
        letterSpacing: "0.02em",
      }}
    >
      {initials(name)}
    </span>
  );
};

// ─────────────────────────────────────────────────────────────────
// ROLE BADGE — colored pill with subtle dot
// ─────────────────────────────────────────────────────────────────
const ROLE_STYLES = {
  "Content Marketer": { bg: "#EDE9FF", fg: "#5A3FE0", dot: "#6B4EFF" },
  "Marketing Manager": { bg: "#FFE9C0", fg: "#A86A00", dot: "#F9AB00" },
  "Video Editor":     { bg: "#D9F1E2", fg: "#1E7E34", dot: "#34A853" },
  "Reviewer":         { bg: "#F1F1F8", fg: "#5F6368", dot: "#5F6368" },
  "Admin":            { bg: "#1A1A2E", fg: "#FFFFFF", dot: "#FFFFFF" },
};
const RoleBadge = ({ role, size = "md" }) => {
  const s = ROLE_STYLES[role] || ROLE_STYLES["Reviewer"];
  const padding = size === "sm" ? "px-2 py-0.5" : "px-2.5 py-1";
  const text = size === "sm" ? "text-[10.5px]" : "text-[11.5px]";
  return (
    <span
      className={`inline-flex items-center gap-1.5 rounded-pill font-medium ${padding} ${text}`}
      style={{ background: s.bg, color: s.fg }}
    >
      <span className="w-1.5 h-1.5 rounded-full" style={{ background: s.dot }}/>
      {role}
    </span>
  );
};

// ─────────────────────────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────────────────────────
const NavItem = ({ icon, label, active, badge, soon, onClick, href }) => {
  const Cmp = href ? "a" : "button";
  return (
    <Cmp
      href={href}
      onClick={onClick}
      className={[
        "relative w-full flex items-center gap-3 px-3 py-2 rounded-input text-[13px] transition group",
        active
          ? "bg-primary-soft text-primary font-medium"
          : soon
            ? "text-ink-3 cursor-not-allowed"
            : "text-ink-2 hover:bg-lavender hover:text-ink",
      ].join(" ")}
    >
      {active && (
        <span className="absolute left-0 top-1.5 bottom-1.5 w-[3px] rounded-full bg-primary"/>
      )}
      <Icon d={icon} size={16}/>
      <span className="flex-1 text-left">{label}</span>
      {badge != null && (
        <span className={`px-1.5 py-0.5 rounded-pill text-[10px] font-semibold ${active ? "bg-white text-primary" : "bg-lavender text-ink-2"}`}>
          {badge}
        </span>
      )}
      {soon && (
        <span className="px-1.5 py-0.5 rounded-pill text-[9.5px] font-semibold tracking-wider"
              style={{ background: "#F1F1F8", color: "#7E7F92" }}>
          SOON
        </span>
      )}
    </Cmp>
  );
};

const SectionLabel = ({ children }) => (
  <div className="text-[10px] mono uppercase tracking-[0.18em] text-ink-3 px-3 mt-5 mb-2">
    {children}
  </div>
);

const Sidebar = ({ active = "settings", user }) => {
  const [menu, setMenu] = React.useState(false);
  const u = user || { name: "Fizza Asad", role: "Content Marketer", email: "rohan@podiumai.com" };
  return (
    <aside
      className="bg-white border-r border-border flex flex-col h-full"
      style={{ width: 220, minWidth: 220 }}
    >
      <div className="px-5 pt-6 pb-4">
        <Logo />
      </div>

      <div className="flex-1 overflow-y-auto pb-2">
        <div className="px-2">
          <div className="space-y-0.5 px-1">
            <NavItem icon={PodiumIcons.home} label="Dashboard" active={active === "dashboard"} href="CMDashboard.html"/>
            <NavItem icon={PodiumIcons.ideation} label="Ideation"       active={active === "ideation"}   href="IdeationList.html"/>
            <NavItem icon={PodiumIcons.mic}      label="Episode Topics" active={active === "episodes"}   href="EpisodeTopics.html"/>
            <NavItem icon={PodiumIcons.brief}    label="Brief Builder"  active={active === "brief"}      href="BriefList.html"/>
            
          </div>

          <SectionLabel>Production</SectionLabel>
          <div className="space-y-0.5 px-1">
            <NavItem icon={PodiumIcons.video}   label="Recordings"     active={active === "recordings"} href="RecordingsList.html"/>
          </div>

          <SectionLabel>Account</SectionLabel>
          <div className="space-y-0.5 px-1"><NavItem icon={PodiumIcons.sliders} label="Configuration" active={["configuration","voice","hosts"].includes(active)} href="Configuration.html"/><div className="ml-4 pl-4 border-l border-border space-y-0.5"><a href="BrandVoice.html" className={["block rounded-input px-3 py-1.5 text-[12px] transition",active==="voice"?"bg-primary-soft text-primary font-medium":"text-ink-3 hover:text-ink hover:bg-lavender"].join(" ")}>Brand Library</a><a href="Hosts.html" className={["block rounded-input px-3 py-1.5 text-[12px] transition",active==="hosts"?"bg-primary-soft text-primary font-medium":"text-ink-3 hover:text-ink hover:bg-lavender"].join(" ")}>Hosts</a></div>
            <NavItem icon={PodiumIcons.settings} label="Settings" active={active === "settings"} href="Settings.html"/>
          </div>
        </div>
      </div>

      {/* User card */}
      <div className="border-t border-border px-3 py-3">
        <div className="relative">
          <div className="flex items-center gap-2.5 px-2 py-2 rounded-input hover:bg-lavender cursor-pointer group" onClick={()=>setMenu(v=>!v)}>
            <Avatar name={u.name} size={32}/>
            <div className="min-w-0 flex-1">
              <div className="text-[12.5px] font-semibold text-ink truncate leading-tight">{u.name}</div>
              <div className="text-[10.5px] text-ink-2 truncate leading-tight">{u.role}</div>
            </div>
            <button className="w-7 h-7 rounded-input grid place-items-center text-ink-3 hover:text-ink hover:bg-white" onClick={e=>e.stopPropagation()}>
              <Icon d={PodiumIcons.moreV} size={16}/>
            </button>
          </div>
          {menu&&<div className="absolute bottom-full left-0 right-0 mb-1 bg-white rounded-card border border-border shadow-card z-50 overflow-hidden"><a href="Login.html" className="flex items-center gap-2.5 px-3 py-2.5 text-[13px] font-medium text-danger hover:bg-[#FFF4F3] transition"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log out</a></div>}
        </div>
      </div>
    </aside>
  );
};

// ─────────────────────────────────────────────────────────────────
// TOPBAR
// ─────────────────────────────────────────────────────────────────
const Crumb = ({ children, last }) => (
  <span className={last ? "text-ink font-medium" : "text-ink-2 hover:text-ink cursor-pointer"}>
    {children}
  </span>
);

const Breadcrumb = ({ items }) => (
  <nav className="flex items-center gap-1.5 text-[13px]">
    {items.map((it, i) => (
      <React.Fragment key={i}>
        <Crumb last={i === items.length - 1}>{it}</Crumb>
        {i < items.length - 1 && (
          <Icon d={PodiumIcons.chevronRight} size={14} className="text-ink-3"/>
        )}
      </React.Fragment>
    ))}
  </nav>
);

const Topbar = ({ breadcrumb, role = "Content Marketer", actions, search = false }) => (
  <header className="h-[64px] bg-white border-b border-border flex items-center px-8 gap-4 shrink-0">
    <div className="flex-1 min-w-0">
      <Breadcrumb items={breadcrumb}/>
    </div>
    {search && (
      <div className="relative">
        <Icon d={PodiumIcons.search} size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-ink-3"/>
        <input
          className="w-[260px] pl-9 pr-3 h-9 rounded-input border border-border text-[13px] placeholder:text-ink-3 focus:outline-none focus:border-primary focus:ring-4 focus:ring-primary/15"
          placeholder="Search episodes, guests…"
        />
      </div>
    )}
    <button className="w-9 h-9 rounded-input grid place-items-center text-ink-2 hover:bg-lavender hover:text-ink">
      <Icon d={PodiumIcons.bell} size={18}/>
    </button>
    <RoleBadge role={role}/>
    {actions}
  </header>
);

// ─────────────────────────────────────────────────────────────────
// EXPORT
// ─────────────────────────────────────────────────────────────────
// MODULE CONTEXT — independent modules with optional upstream attachments
const StepProgress = ({ steps }) => {
  const statusLabel = {
    done: "Attached",
    current: "Open",
    review: "Review",
    upcoming: "Available",
  };
  const statusStyle = {
    done:     { bg: "#D9F1E2", fg: "#1E7E34", dot: "#34A853" },
    current:  { bg: "#EDE9FF", fg: "#5A3FE0", dot: "#6B4EFF" },
    review:   { bg: "#FFE9C0", fg: "#A86A00", dot: "#F9AB00" },
    upcoming: { bg: "#F1F1F8", fg: "#5F6368", dot: "#ADADBE" },
  };
  return (
    <div className="space-y-3">
      <div className="flex items-center justify-between gap-3">
        <div className="text-[10.5px] mono uppercase tracking-[0.18em] text-ink-3">Independent modules</div>
        <div className="text-[11.5px] text-ink-2">Attach previous work when it helps; modules can be reused one-to-many.</div>
      </div>
      <ol className="grid grid-cols-4 gap-3 w-full">
        {steps.map((s) => {
          const state = s.state || "upcoming";
          const colors = statusStyle[state] || statusStyle.upcoming;
          return (
            <li key={s.label} className="rounded-input border border-border bg-white px-3 py-2.5 min-w-0">
              <div className="flex items-center justify-between gap-2">
                <div className="text-[12.5px] font-semibold text-ink truncate">{s.label}</div>
                <span className="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-pill text-[10px] font-semibold shrink-0" style={{ background: colors.bg, color: colors.fg }}>
                  <span className="w-1.5 h-1.5 rounded-full" style={{ background: colors.dot }}/>
                  {statusLabel[state] || "Available"}
                </span>
              </div>
              {s.sub && <div className="text-[11px] text-ink-3 mt-1 truncate">{s.sub}</div>}
            </li>
          );
        })}
      </ol>
    </div>
  );
};

// SCORE BADGE — gradient relevance / virality pill
const ScoreBadge = ({ kind, value, size = "md" }) => {
  // kind: "rel" (relevance → violet→magenta) | "vir" (virality → coral→amber)
  const grad =
    kind === "rel"
      ? "linear-gradient(90deg,#6B4EFF 0%, #B26BFF 100%)"
      : "linear-gradient(90deg,#FF7A59 0%, #FFB572 100%)";
  const label = kind === "rel" ? "REL" : "VIR";
  const isSm = size === "sm";
  return (
    <span
      className={`inline-flex items-center gap-1.5 rounded-pill text-white ${isSm ? "px-2 py-0.5" : "px-2.5 py-1"}`}

const UserModal = ({user, onSave, onClose}) => {

  const handleSave = () => {

const Th = ({ children, className = "" }) => (

);
const Td = ({ children, className = "" }) => (

const UsersTab = ({users, setUsers}) => {

    setUsers(prev => prev.some(x=>x.id===u.id) ? prev.map(x=>x.id===u.id?u:x) : [...prev,u]);

  return (
    <>
      <div className="bg-white rounded-card shadow-card overflow-hidden">

        <UserModal

// ─────────────────────────────────────────────────────────────────
// ROLES TAB — split panel with module-based permission editor
// ─────────────────────────────────────────────────────────────────
const RoleEditor = ({role, onSave}) => {
  const [form, setForm] = useState({
    name: role?.name || "",
    businessRole: role?.businessRole || "Content Marketer",
    description: role?.description || "",
    perms: new Set(role?.perms || []),
  });
  const [saved, setSaved] = useState(false);

  const togglePerm = id => setForm(f=>{
    const s = new Set(f.perms);
    s.has(id) ? s.delete(id) : s.add(id);
    return {...f, perms:s};
  });

  const handleSave = () => {
    onSave({...role, ...form, perms:[...form.perms]});
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  };

  return (
    <div className="flex-1 min-w-0 flex flex-col h-full overflow-hidden">
      <div className="flex items-center justify-between px-6 py-4 border-b border-border shrink-0">
        <div>
          <div className="mono text-[10px] uppercase tracking-[0.14em] text-primary">Access control</div>
          <h2 className="text-[18px] font-semibold text-ink mt-0.5">{role?.id ? "Edit role" : "New role"}</h2>
        </div>
        <button onClick={handleSave}
          className="h-9 px-5 rounded-pill bg-primary hover:bg-primary-hover text-white text-[13px] font-medium transition inline-flex items-center gap-1.5 shadow-[0_4px_10px_-2px_rgba(107,78,255,0.45)]">
          {saved
            ? <><Icon d={PodiumIcons.check} size={13} stroke={2.5}/>Saved</>
            : <><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>Save</>
          }
        </button>
      </div>

      <div className="flex-1 overflow-y-auto px-6 py-5 space-y-5">
        <div className="grid grid-cols-2 gap-4">
          <F label="Role name">
            <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Content Reviewer" className={inputCls}/>
          </F>
          <F label="Business role">
            <div className="relative">
              <select value={form.businessRole} onChange={e=>setForm(f=>({...f,businessRole:e.target.value}))} className={selectCls}>
                {BUSINESS_ROLES.map(r=><option key={r}>{r}</option>)}
              </select>
              <Icon d={PodiumIcons.chevronDown} size={14} className="absolute right-3 top-1/2 -translate-y-1/2 text-ink-3 pointer-events-none"/>
            </div>
            <div className="text-[11px] text-ink-3 mt-1">Optional default job/function this permission set is designed for.</div>
          </F>
        </div>

        <F label="Description">
          <textarea value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} rows={3}
            className={inputCls + " leading-relaxed"} placeholder="Describe what this role can do…"/>
        </F>

        {PERMISSION_MODULES.map(mod=>(
          <div key={mod.module}>
            <div className="text-[13px] font-semibold text-ink mb-3">{mod.module}</div>
            <div className="grid grid-cols-2 gap-2">
              {mod.perms.map(p=>(
                <label key={p.id}
                  className={`flex items-start gap-3 p-3 rounded-input border cursor-pointer transition ${form.perms.has(p.id)?"border-primary/30 bg-primary-soft/25":"border-border bg-lavender/30 hover:border-border/80"}`}>
                  <div className={`w-5 h-5 rounded border-2 flex items-center justify-center shrink-0 mt-0.5 transition ${form.perms.has(p.id)?"bg-primary border-primary":"bg-white border-border"}`}
                    onClick={()=>togglePerm(p.id)}>
                    {form.perms.has(p.id) && <Icon d={PodiumIcons.check} size={11} stroke={3} className="text-white"/>}
                  </div>
                  <div className="min-w-0" onClick={()=>togglePerm(p.id)}>
                    <div className="text-[13px] font-medium text-ink leading-snug">{p.label}</div>
                    <div className="text-[11.5px] text-ink-3 mt-0.5">{p.detail}</div>
                  </div>
                </label>
              ))}
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

const RolesTab = ({roles, setRoles}) => {
  const [selectedId, setSelectedId] = useState(roles[0]?.id || null);

        </div>
        <div className="flex-1 overflow-y-auto py-2">
          {roles.map(r=>(
            <button key={r.id} onClick={()=>setSelectedId(r.id)}
              className={`w-full text-left px-4 py-3 transition ${r.id===selectedId?"bg-primary-soft/60 border-l-[3px] border-primary pl-[13px]":"hover:bg-lavender/60 border-l-[3px] border-transparent"}`}>
              <div className="text-[13.5px] font-semibold text-ink leading-snug">{r.name||<span className="text-ink-3 italic">Untitled role</span>}</div>
              <div className="text-[11.5px] text-ink-3 mt-0.5">{r.perms.length} permission{r.perms.length!==1?"s":""}</div>
            </button>
          ))}
        </div>
      </div>

      {/* Right: editor */}
      {selected
        ? <RoleEditor key={selected.id} role={selected} onSave={saveRole}/>
        : <div className="flex-1 flex items-center justify-center text-ink-3 text-[13px]">Select a role to edit</div>
      }
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────
// MY PROFILE TAB
// ─────────────────────────────────────────────────────────────────
const ProfileTab = () => {
  const [form, setForm] = useState({
    name:"Fizza Asad", email:"fizza@podlab.internal", jobTitle:"Content Lead", bio:"",
    avatar: null,
  });
  const [saved, setSaved] = useState(false);
  const [pwForm, setPwForm] = useState({current:"",next:"",confirm:""});
  const fileRef = useRef(null);
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const handleFile = e => {
    const file = e.target.files[0]; if(!file)return;
    const r = new FileReader();
    r.onload = ev => set("avatar", ev.target.result);
    r.readAsDataURL(file);
  };

  const handleSave = () => { setSaved(true); setTimeout(()=>setSaved(false),2200); };

  return (
    <div className="max-w-[720px] space-y-5">
      {/* Avatar + basics */}
      <div className="bg-white rounded-card shadow-card p-6">
        <div className="text-[14px] font-semibold text-ink mb-4">Profile</div>
        <div className="flex items-start gap-6 mb-5">
          <div className="relative shrink-0">
            {form.avatar
              ? <img src={form.avatar} alt="" className="w-20 h-20 rounded-full object-cover border-2 border-border"/>
              : <div className="w-20 h-20 rounded-full bg-primary text-white flex items-center justify-center text-[22px] font-bold border-2 border-border">
                  {form.name.split(" ").map(s=>s[0]).join("").slice(0,2)}
                </div>
            }
            <button onClick={()=>fileRef.current?.click()}
              className="absolute bottom-0 right-0 w-7 h-7 rounded-full bg-white border border-border text-ink-2 grid place-items-center hover:text-primary hover:border-primary/40 transition shadow-sm">
              <Icon d={PodiumIcons.edit} size={13}/>
            </button>
            <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleFile}/>
          </div>
          <div className="flex-1 min-w-0">
            <div className="text-[17px] font-bold text-ink">{form.name}</div>
            <div className="text-[13px] text-ink-2 mt-0.5">{form.jobTitle || "No title set"}</div>
            <div className="flex items-center gap-2 mt-2">
              <RoleBadge role="Content Marketer" size="sm"/>
              <span className="text-[11.5px] text-ink-3 mono">{form.email}</span>
            </div>
            <button onClick={()=>fileRef.current?.click()} className="mt-3 text-[12.5px] text-primary font-medium hover:underline">
              {form.avatar ? "Change photo" : "Upload a photo"}
            </button>
            {form.avatar && <button onClick={()=>set("avatar",null)} className="ml-3 text-[12.5px] text-danger hover:underline">Remove</button>}
          </div>
        </div>

        <div className="grid grid-cols-2 gap-4 mb-4">
          <F label="Full name">
            <input value={form.name} onChange={e=>set("name",e.target.value)} className={inputCls}/>
          </F>
          <F label="Email address">
            <input type="email" value={form.email} onChange={e=>set("email",e.target.value)} className={inputCls}/>
          </F>
          <F label="Job title">
            <input value={form.jobTitle} onChange={e=>set("jobTitle",e.target.value)} placeholder="e.g. Content Lead" className={inputCls}/>
          </F>
          <F label="Role">
            <input value="Content Marketer" disabled className={inputCls + " bg-lavender/50 text-ink-3 cursor-not-allowed"}/>
          </F>
        </div>
        <F label="Bio (optional)">
          <textarea value={form.bio} onChange={e=>set("bio",e.target.value)} rows={3} placeholder="A short bio visible to teammates…" className={inputCls + " leading-relaxed"}/>
        </F>

        <div className="flex items-center gap-3 mt-5 pt-5 border-t border-border">
          <button onClick={handleSave}
            className="h-9 px-5 rounded-pill bg-primary hover:bg-primary-hover text-white text-[13px] font-medium transition inline-flex items-center gap-2 shadow-[0_4px_10px_-2px_rgba(107,78,255,0.45)]">
            {saved ? <><Icon d={PodiumIcons.check} size={13} stroke={2.5}/>Saved!</> : "Save profile"}
          </button>
        </div>
      </div>

      {/* Password */}
      <div className="bg-white rounded-card shadow-card p-6">
        <div className="text-[14px] font-semibold text-ink mb-4">Change password</div>
        <div className="space-y-3">
          <F label="Current password">
            <input type="password" value={pwForm.current} onChange={e=>setPwForm(f=>({...f,current:e.target.value}))} placeholder="••••••••" className={inputCls}/>
          </F>
          <div className="grid grid-cols-2 gap-4">
            <F label="New password">
              <input type="password" value={pwForm.next} onChange={e=>setPwForm(f=>({...f,next:e.target.value}))} placeholder="••••••••" className={inputCls}/>
            </F>
            <F label="Confirm new password">
              <input type="password" value={pwForm.confirm} onChange={e=>setPwForm(f=>({...f,confirm:e.target.value}))} placeholder="••••••••" className={inputCls}/>
            </F>
          </div>
        </div>
        <div className="mt-5 pt-5 border-t border-border">
          <button className="h-9 px-5 rounded-pill border border-border text-[13px] font-medium text-ink-2 hover:text-ink hover:bg-lavender transition">
            Update password
          </button>
        </div>
      </div>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────
// PAGE
// ─────────────────────────────────────────────────────────────────
const SettingsPage = () => {
  const [tab, setTab] = useState("users");
  const [users, setUsers] = useState(SEED_USERS);
  const [roles, setRoles] = useState(SEED_ROLES);

  return (
    <div className="h-full flex flex-col bg-lavender">
      <Topbar
        breadcrumb={["Workspace","Settings","User management"]}
        role="Content Marketer"
      />

      <main className="flex-1 overflow-y-auto">
        <div className="max-w-[1180px] mx-auto px-8 py-8">
          <div className="mb-6">
            <div className="mono text-[11px] uppercase tracking-[0.18em] text-ink-2 mb-1.5">Settings</div>
            <h1 className="text-[28px] font-bold display leading-tight">User management</h1>
            <p className="text-[13.5px] text-ink-2 mt-1.5">Manage workspace members, roles, and your own profile.</p>
          </div>

          <div className="mb-6">
            <Tabs value={tab} onChange={setTab} tabs={[
              {id:"users",   label:"Users",               count: users.length},
              {id:"roles",   label:"Roles & Permissions", count: roles.length},
              {id:"profile", label:"My Profile"},
            ]}/>
          </div>

          {tab==="users"   && <UsersTab users={users} setUsers={setUsers}/>}
          {tab==="roles"   && <RolesTab roles={roles} setRoles={setRoles}/>}
          {tab==="profile" && <ProfileTab/>}

          <div className="text-[11.5px] text-ink-3 mono mt-10">podium ai · settings · workspace</div>
        </div>
      </main>
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────
// APP SHELL

function App() {
  return (
    <div className="h-screen w-screen flex" data-screen-label="Settings · User Management">
      <Sidebar active="settings"/>
      <div className="flex-1 min-w-0 flex flex-col">
        <SettingsPage/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
