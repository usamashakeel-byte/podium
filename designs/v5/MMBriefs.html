const InlineEdit = ({ value, onChange, className="" }) => {
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(value);
  const ref=useRef(null);

  useEffect(()=>{
    if(editing&&ref.current){
      const el=ref.current;
      el.focus();
      el.style.height="auto";
      el.style.height=el.scrollHeight+"px";
      el.setSelectionRange(el.value.length,el.value.length);
    }
  },[editing]);

  const commit=()=>{
    const v=draft.trim();
    setEditing(false);
    if(v&&v!==value) onChange(v); else setDraft(value);
  };

  if(editing){
    return (
      <textarea ref={ref} value={draft}
        onChange={e=>{setDraft(e.target.value);const el=e.target;el.style.height="auto";el.style.height=el.scrollHeight+"px";}}
        onBlur={commit}
        onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();commit();} if(e.key==="Escape"){setDraft(value);setEditing(false);}}}
        className={`w-full outline-none resize-none bg-transparent px-1 -mx-1 ${className}`}
        style={{overflow:"hidden",borderBottom:"1.5px solid #6B4EFF",borderRadius:4}}
      />
    );
  }

  return (
    <span onClick={()=>{setDraft(value);setEditing(true);}}
      className={`block cursor-text px-1 -mx-1 py-0.5 transition editable-hover ${className}`}
      title="Click to edit">
      {value}
    </span>
  );
};

const EditableGeneratedList = ({ items, onChange, variant }) => {
  const [adding,setAdding]=useState(false);
  const [newVal,setNewVal]=useState("");
  const addRef=useRef(null);

  useEffect(()=>{if(adding&&addRef.current)addRef.current.focus();},[adding]);

  const update=(idx,val)=>onChange(items.map((item,i)=>i===idx?val:item));
  const add=()=>{
    const v=newVal.trim();
    if(v) onChange([...items,v]);
    setNewVal("");
    setAdding(false);
  };

  return (
    <div className="space-y-2">
      {items.map((item,i)=>(
        <div key={i} className={`flex ${variant==="numbered"?"gap-2.5":"gap-2"} text-[12.5px] text-ink-2 leading-relaxed`}>
          {variant==="numbered" ? (
            <span className="w-5 h-5 rounded-full bg-primary-soft grid place-items-center shrink-0 mt-0.5">
              <span className="text-[9px] font-bold text-primary">{i+1}</span>
            </span>
          ) : (
            <span className="w-1.5 h-1.5 rounded-full bg-primary shrink-0 mt-2"/>
          )}
          <InlineEdit value={item} onChange={v=>update(i,v)} className="text-[12.5px] text-ink-2 leading-relaxed"/>
        </div>
      ))}
      {adding ? (
        <textarea ref={addRef} value={newVal} rows={2}
          onChange={e=>setNewVal(e.target.value)}
          onBlur={()=>newVal.trim()?add():setAdding(false)}
          onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();add();} if(e.key==="Escape")setAdding(false);}}
          placeholder="Type and press Enter to add..."
          className="w-full outline-none resize-none bg-transparent text-[12.5px] text-ink leading-relaxed placeholder:text-ink-3 px-1"
          style={{borderBottom:"1px solid #6B4EFF"}}
        />
      ) : (
        <button onClick={()=>setAdding(true)}
          className="text-[12px] text-ink-3 hover:text-primary transition opacity-75 hover:opacity-100">
          + Add point
        </button>
      )}
    </div>
  );
};

            <div><span className="mono text-[10px] uppercase tracking-[0.12em] text-ink-3 block">Approval Scope</span><span className="font-medium text-ink">Brief + host + guest</span></div>
          </div>

          <div className="px-5 py-5 grid grid-cols-2 gap-5">
            {/* Questions */}
            <div>
              <div className="text-[13px] font-semibold text-ink mb-3">Interview Questions ({questions.length})</div>
              <EditableGeneratedList items={questions} onChange={setQuestions} variant="numbered"/>
            </div>

            {/* Discussion areas */}
            <div>
              <div className="text-[13px] font-semibold text-ink mb-3">Areas of Discussion ({discussionAreas.length})</div>
              <EditableGeneratedList items={discussionAreas} onChange={setDiscussionAreas} variant="bulleted"/>
            </div>
          </div>

          {/* Feedback + actions */}
          <div className="px-5 pb-5 border-t border-border pt-4">
            <div className="mb-3">
              <label className="text-[12px] font-medium uppercase tracking-[0.04em] text-ink-2 mb-1.5 block">Feedback for Content Marketer (optional)</label>
              <textarea rows={3} value={feedback} onChange={e=>setFeedback(e.target.value)}
                placeholder="Add notes about the questions, discussion areas, or any changes requested…"
                className="w-full px-3.5 py-3 rounded-input border border-border text-[13px] bg-white resize-none placeholder:text-ink-3 leading-relaxed"/>
            </div>

            {saved ? (
              <div className="flex items-center gap-2 text-[13px] font-medium" style={status==="Approved"?{color:"#1E7E34"}:{color:"#B92E22"}}>
                <Icon d={I.checkCircle} size={16} stroke={2}/>
                Brief package {status === "Approved" ? "approved" : "rejected"} — team has been notified.
              </div>
            ) : (
              <div className="flex items-center gap-3">
                <button onClick={e=>{e.stopPropagation();approve();}}
                  className="h-10 px-6 rounded-pill bg-success hover:bg-success/90 text-white text-[13px] font-medium transition inline-flex items-center gap-2 shadow-[0_6px_14px_-4px_rgba(52,168,83,0.5)]">
                  <Icon d={I.check} size={14} stroke={2.5}/>Approve Brief &amp; Guest
                </button>
                <button onClick={e=>{e.stopPropagation();reject();}}
                  className="h-10 px-6 rounded-pill bg-danger hover:bg-danger/90 text-white text-[13px] font-medium transition inline-flex items-center gap-2 shadow-[0_6px_14px_-4px_rgba(234,67,53,0.4)]">
                  <Icon d={I.x} size={14} stroke={2.5}/>Reject Brief
                </button>
                <button onClick={e=>{e.stopPropagation();setExpanded(false);}} className="h-10 px-4 rounded-pill border border-border text-[13px] font-medium text-ink-2 hover:text-ink transition">
                  Collapse
                </button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
};

const MMBriefsPage = () => {
  const [filter, setFilter] = useState("All");
  const filtered = filter === "All" ? BRIEFS : BRIEFS.filter(b => b.status === filter);
  const counts = f => f === "All" ? BRIEFS.length : BRIEFS.filter(b => b.status === f).length;

  return (
    <div className="h-full flex flex-col bg-lavender">
      <Topbar/>
      <main className="flex-1 overflow-y-auto">
        <div className="max-w-[1180px] mx-auto px-8 py-8">

          <div className="mb-6">
            <div className="mono text-[11px] uppercase tracking-[0.18em] text-ink-2 mb-1.5">Marketing Manager</div>
            <h1 className="text-[28px] font-bold display">Brief Reviews</h1>
            <p className="text-[13.5px] text-ink-2 mt-1">Review the full brief package: episode framing, host guidance, confirmed guest, questions, and talking points.</p>
          </div>

          {/* Stats */}
          <div className="grid grid-cols-4 gap-3 mb-5">
            {[
              {label:"Total Briefs",value:BRIEFS.length,color:"#1A1A2E"},
              {label:"Pending Review",value:BRIEFS.filter(b=>b.status==="Pending Review").length,color:"#A86A00"},
              {label:"Approved",value:BRIEFS.filter(b=>b.status==="Approved").length,color:"#34A853"},
              {label:"Rejected",value:BRIEFS.filter(b=>b.status==="Rejected").length,color:"#EA4335"},
            ].map(s=>(
              <div key={s.label} className="bg-white rounded-card shadow-card px-4 py-3">
                <div className="text-[24px] font-bold display" style={{color:s.color}}>{s.value}</div>
                <div className="text-[12px] text-ink-2 mt-0.5">{s.label}</div>
              </div>
            ))}
          </div>

          {/* Filters */}
          <div className="flex items-center gap-2 mb-5">
            {FILTERS.map(f=>(
              <button key={f} onClick={()=>setFilter(f)}
                className={["h-8 px-4 rounded-pill text-[12.5px] font-medium transition",
                  filter===f?"bg-ink text-white":"bg-white border border-border text-ink-2 hover:text-ink hover:border-ink-3"].join(" ")}>
                {f} <span className="opacity-60">({counts(f)})</span>
              </button>
            ))}
          </div>

          {filtered.map(brief=><BriefRow key={brief.id} brief={brief}/>)}

          <div className="text-[11px] text-ink-3 mono mt-6">podium · marketing manager · brief reviews</div>
        </div>
      </main>
    </div>
  );
};

function App(){
  return (
    <div className="h-screen w-screen flex" data-screen-label="Brief Reviews">
      <Sidebar active="brief-reviews"/>
      <div className="flex-1 min-w-0 flex flex-col"><MMBriefsPage/></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>window.parent.postMessage({type:'podium_navigate',page:'screens/MMBriefs.html'},'*');</script></body>
</html>
