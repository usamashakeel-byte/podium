<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Podium — Brief Builder</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
  tailwind.config={theme:{extend:{colors:{lavender:'#EEEEF8',primary:'#6B4EFF','primary-hover':'#5A3FE0','primary-soft':'#EDE9FF',success:'#34A853',warning:'#F9AB00',danger:'#EA4335',ink:'#1A1A2E','ink-2':'#5F6368','ink-3':'#ADADBE',border:'#E2E2EE'},fontFamily:{sans:['Inter','system-ui','sans-serif']},boxShadow:{card:'0 1px 2px rgba(26,26,46,0.04), 0 4px 12px rgba(26,26,46,0.04)'},borderRadius:{card:'12px',input:'8px',pill:'999px'}}}}
</script>
<style>
  html,body,#root{height:100%}body{font-family:'Inter',sans-serif;color:#1A1A2E;background:#EEEEF8}.mono{font-family:'Inter',sans-serif}.display{letter-spacing:-0.02em}
  .card-hover{transition:box-shadow .18s,transform .12s}.card-hover:hover{box-shadow:0 4px 8px rgba(26,26,46,0.06),0 12px 28px rgba(107,78,255,0.10)}
  .modal-bg{position:fixed;inset:0;background:rgba(26,26,46,0.45);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:50}
  @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .modal-panel{animation:slideUp .22s ease both}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const Icon=({d,size=18,stroke=1.75,className="",fill})=>(<svg width={size} height={size} viewBox="0 0 24 24" fill={fill||"none"} stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" className={className}>{d}</svg>);
const I={
  home:<><path d="M3 10.5L12 3l9 7.5"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></>,
  ideation:<path d="M9 18h6M10 21h4M12 3a6 6 0 014 10.5c-.7.7-1 1.5-1 2.5H9c0-1-.3-1.8-1-2.5A6 6 0 0112 3z"/>,
  brief:<><path d="M14 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V8z"/><path d="M14 3v5h5M9 13h6M9 17h4"/></>,
  settings:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1.1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1.1 1.7 1.7 0 00-.3-1.8l-.1-.1A2 2 0 117 5.9l.1.1a1.7 1.7 0 001.8.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></>,
  chevR:<path d="M9 6l6 6-6 6"/>,chevDown:<path d="M6 9l6 6 6-6"/>,
  plus:<><path d="M12 5v14M5 12h14"/></>,
  bell:<><path d="M6 8a6 6 0 1112 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 004 0"/></>,
  moreV:<><circle cx="12" cy="5" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.4" fill="currentColor" stroke="none"/></>,sliders:<><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3"/><path d="M1 14h6M9 8h6M17 16h6"/></>,
  mic:<><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0014 0M12 18v3M9 21h6"/></>,video:<><rect x="2" y="7" width="14" height="10" rx="2"/><path d="M16 10l5-3v10l-5-3"/></>,share2:<><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8-3M8.6 10.5l6.8 3"/></>,studio:<><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4M10 8l5 3-5 3V8z"/></>,voice:<><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></>,
  x:<path d="M6 6l12 12M6 18L18 6"/>,
  check:<path d="M5 12l5 5L20 7"/>,
  clock:<><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></>,
};
const Logo=()=>(<a href="CMDashboard.html" className="flex items-center gap-2.5 hover:opacity-90 transition"><div className="relative w-10 h-10 rounded-[11px] overflow-hidden" style={{background:"#1A1A2E"}}><svg viewBox="0 0 40 40" width="40" height="40" fill="none"><rect width="40" height="40" rx="11" fill="#1A1A2E"/><rect x="16" y="8" width="8" height="15" rx="4" fill="#FFFFFF"/><path d="M11 19a9 9 0 0018 0" stroke="#FFFFFF" strokeWidth="2.5" strokeLinecap="round" fill="none"/><path d="M20 28v4" stroke="#FFFFFF" strokeWidth="2.5" strokeLinecap="round"/><path d="M16 32h8" stroke="#FFFFFF" strokeWidth="2.5" strokeLinecap="round"/></svg></div><div className="text-[20px] tracking-[-0.02em] text-ink" style={{fontWeight:700}}>Podium AI<span style={{color:"#6B4EFF"}}>.</span></div></a>);
const TINTS=[{bg:"#6B4EFF",fg:"#FFF"},{bg:"#FFE0DA",fg:"#B92E22"},{bg:"#D9F1E2",fg:"#1E7E34"},{bg:"#FFE9C0",fg:"#A86A00"},{bg:"#E3DCFF",fg:"#5A3FE0"},{bg:"#1A1A2E",fg:"#FFF"}];
const tintFor=n=>{if((n||"").trim()==="Fizza Asad")return TINTS[0];let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))>>>0;return TINTS[h%TINTS.length]};
const Avatar=({name,size=32})=>{const t=tintFor(name);return <span className="inline-flex items-center justify-center font-semibold rounded-full shrink-0" style={{width:size,height:size,background:t.bg,color:t.fg,fontSize:size<=32?11:13,letterSpacing:"0.02em"}}>{name.split(/\s+/).filter(Boolean).slice(0,2).map(s=>s[0]).join("").toUpperCase()}</span>};
const RoleBadge=()=><span className="inline-flex items-center gap-1.5 rounded-pill font-medium px-2.5 py-1 text-[11.5px]" style={{background:"#EDE9FF",color:"#5A3FE0"}}><span className="w-1.5 h-1.5 rounded-full bg-primary"/>Content Marketer</span>;
const NavItem=({icon,label,active,href})=>(<a href={href} className={["relative w-full flex items-center gap-3 px-3 py-2 rounded-input text-[13px] transition",active?"bg-primary-soft text-primary font-medium":"text-ink-2 hover:bg-lavender hover:text-ink"].join(" ")}>{active&&<span className="absolute left-0 top-1.5 bottom-1.5 w-[3px] rounded-full bg-primary"/>}<Icon d={icon} size={16}/><span className="flex-1 text-left">{label}</span></a>);
const SectionLabel=({children})=>(<div className="text-[10px] mono uppercase tracking-[0.18em] text-ink-3 px-3 mt-5 mb-2">{children}</div>);
const Sidebar=({active="brief"})=>{const [menu,setMenu]=useState(false);const u={name:"Fizza Asad",role:"Content Marketer"};return(<aside className="bg-white border-r border-border flex flex-col h-full" style={{width:220,minWidth:220}}><div className="px-5 pt-6 pb-4"><Logo/></div><div className="flex-1 overflow-y-auto pb-2"><div className="px-2"><div className="space-y-0.5 px-1"><NavItem icon={I.home} label="Dashboard" active={active==="dashboard"} href="CMDashboard.html"/><NavItem icon={I.ideation} label="Ideation" active={active==="ideation"} href="IdeationList.html"/><NavItem icon={I.mic} label="Episode Topics" active={active==="episodes"} href="EpisodeTopics.html"/><NavItem icon={I.brief} label="Brief Builder" active={active==="brief"} href="BriefList.html"/></div><SectionLabel>Production</SectionLabel><div className="space-y-0.5 px-1"><NavItem icon={I.video} label="Recordings" active={active==="recordings"} href="RecordingsList.html"/></div><SectionLabel>Account</SectionLabel><div className="space-y-0.5 px-1"><NavItem icon={I.sliders} label="Configuration" active={["configuration","voice","hosts"].includes(active)} href="Configuration.html"/><div className="ml-4 pl-4 border-l border-border space-y-0.5"><a href="BrandVoice.html" className={["block rounded-input px-3 py-1.5 text-[12px] transition",active==="voice"?"bg-primary-soft text-primary font-medium":"text-ink-3 hover:text-ink hover:bg-lavender"].join(" ")}>Brand Library</a><a href="Hosts.html" className={["block rounded-input px-3 py-1.5 text-[12px] transition",active==="hosts"?"bg-primary-soft text-primary font-medium":"text-ink-3 hover:text-ink hover:bg-lavender"].join(" ")}>Hosts</a></div><NavItem icon={I.settings} label="Settings" active={active==="settings"} href="Settings.html"/></div></div></div><div className="border-t border-border px-3 py-3"><div className="relative"><div className="flex items-center gap-2.5 px-2 py-2 rounded-input hover:bg-lavender cursor-pointer" onClick={()=>setMenu(v=>!v)}><Avatar name={u.name} size={32}/><div className="min-w-0 flex-1"><div className="text-[12.5px] font-semibold text-ink truncate leading-tight">{u.name}</div><div className="text-[10.5px] text-ink-2 truncate leading-tight">{u.role}</div></div><button className="w-7 h-7 rounded-input grid place-items-center text-ink-3 hover:text-ink hover:bg-white" onClick={e=>e.stopPropagation()}><Icon d={I.moreV} size={16}/></button></div>{menu&&<div className="absolute bottom-full left-0 right-0 mb-1 bg-white rounded-card border border-border shadow-card z-50 overflow-hidden"><a href="Login.html" className="flex items-center gap-2.5 px-3 py-2.5 text-[13px] font-medium text-danger hover:bg-[#FFF4F3] transition"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log out</a></div>}</div></div></aside>)};
const Crumb=({items})=>(<nav className="flex items-center gap-1.5 text-[13px]">{items.map((it,i)=>(<React.Fragment key={i}><span className={i===items.length-1?"text-ink font-medium":"text-ink-2 hover:text-ink cursor-pointer"}>{it}</span>{i<items.length-1&&<Icon d={I.chevR} size={14} className="text-ink-3"/>}</React.Fragment>))}</nav>);
const Topbar=({breadcrumb,actions})=>(<header className="h-[64px] bg-white border-b border-border flex items-center px-8 gap-4 shrink-0"><div className="flex-1 min-w-0"><Crumb items={breadcrumb}/></div><button className="w-9 h-9 rounded-input grid place-items-center text-ink-2 hover:bg-lavender hover:text-ink"><Icon d={I.bell} size={18}/></button><RoleBadge/>{actions}</header>);
</script>

<script type="text/babel">
const { useState } = React;

const BRIEFS = [
  { id:"BR-003", epId:"EP-006", epTitle:"Inside the procurement black box: a CIO perspective", topicGroup:"The Procurement Bottleneck", segment:"Sweetspot", brandVoice:"The Revenue Engine", status:"In Review", date:"May 21" },
  { id:"BR-002", epId:"EP-001", epTitle:"The pricing flip: how SaaS companies are abandoning subscriptions", topicGroup:"Why SaaS is dead", segment:"Sweetspot", brandVoice:"The Revenue Engine", status:"Draft", date:"May 20" },
  { id:"BR-001", epId:"EP-009", epTitle:"AI pair programming: measuring actual productivity gains", topicGroup:"DevTools & Developer Productivity", segment:"Sweetspot", brandVoice:"The Revenue Engine", status:"Approved", date:"May 15" },
];

const APPROVED_EPISODES = [
  { id:"EP-001", title:"The pricing flip: how SaaS companies are abandoning subscriptions", topic:"Why SaaS is dead", hasBrief:true },
  { id:"EP-002", title:"Usage-based pricing war stories from founders who made the switch", topic:"Why SaaS is dead", hasBrief:false },
  { id:"EP-006", title:"Inside the procurement black box: a CIO perspective", topic:"The Procurement Bottleneck", hasBrief:true },
  { id:"EP-009", title:"AI pair programming: measuring actual productivity gains", topic:"DevTools & Productivity", hasBrief:true },
];

const STATUS_STYLE = {
  Draft:     { bg:"#F1F1F8", fg:"#5F6368", dot:"#ADADBE" },
  "In Review": { bg:"#FFE9C0", fg:"#A86A00", dot:"#F9AB00" },
  Approved:  { bg:"#D9F1E2", fg:"#1E7E34", dot:"#34A853" },
};
const FILTERS = ["All","Draft","In Review","Approved"];

const BriefCard = ({ brief }) => {
  const ss = STATUS_STYLE[brief.status];
  return (
    <div className="card-hover bg-white rounded-card shadow-card px-5 py-4 flex items-center gap-5">
      <div className="w-10 h-10 rounded-card grid place-items-center shrink-0" style={{ background:"#EDE9FF" }}>
        <Icon d={I.brief} size={18} className="text-primary"/>
      </div>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 mb-0.5">
          <span className="mono text-[10.5px] uppercase tracking-[0.12em] text-ink-3">{brief.id}</span>
          <span className="text-ink-3 text-[10px]">·</span>
          <span className="text-[11px] text-ink-2">{brief.topicGroup}</span>
        </div>
        <div className="text-[14.5px] font-semibold display text-ink truncate">{brief.epTitle}</div>
        <div className="flex items-center gap-1.5 mt-1.5">
          <span className="px-2 py-0.5 rounded-pill text-[10.5px] font-medium" style={{background:"#EDE9FF",color:"#5A3FE0"}}>{brief.segment}</span>
          <span className="text-ink-3 text-[10px]">·</span>
          <span className="inline-flex items-center gap-1 text-[10.5px] text-ink-2">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#6B4EFF" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            {brief.brandVoice}
          </span>
          <span className="text-ink-3 text-[10px]">·</span>
          <span className="mono text-[10.5px] text-ink-3">{brief.epId}</span>
        </div>
      </div>
      <div className="flex flex-col items-end gap-2.5 shrink-0">
        <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-pill text-[11px] font-semibold" style={{ background:ss.bg, color:ss.fg }}>
          <span className="w-1.5 h-1.5 rounded-full" style={{ background:ss.dot }}/>
          {brief.status}
        </span>
        <span className="text-[11px] text-ink-3 mono">{brief.date}</span>
        <a href="BriefDetail.html" className="h-8 px-4 rounded-pill text-[12.5px] font-medium bg-ink text-white hover:bg-primary inline-flex items-center gap-1.5 transition">
          Open Brief<Icon d={I.chevR} size={13}/>
        </a>
      </div>
    </div>
  );
};

const NewBriefModal = ({ onClose }) => {
  const available = APPROVED_EPISODES.filter(e => !e.hasBrief);
  const [selected, setSelected] = useState(null);
  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal-panel bg-white rounded-card shadow-card w-[560px] max-h-[80vh] overflow-hidden flex flex-col" onClick={e=>e.stopPropagation()}>
        <div className="px-6 pt-5 pb-4 border-b border-border flex items-center justify-between">
          <div>
            <div className="text-[17px] font-semibold display">New Brief</div>
            <div className="text-[12.5px] text-ink-2 mt-0.5">Select an approved episode topic to build a brief for</div>
          </div>
          <button onClick={onClose} className="w-8 h-8 rounded-input grid place-items-center text-ink-3 hover:text-ink hover:bg-lavender">
            <Icon d={I.x} size={16}/>
          </button>
        </div>
        <div className="flex-1 overflow-y-auto px-6 py-4 space-y-2">
          {available.length === 0 ? (
            <div className="text-center py-8 text-ink-2 text-[13px]">All approved episodes already have briefs.</div>
          ) : available.map(ep => (
            <button key={ep.id} onClick={() => setSelected(ep.id)}
              className={["w-full text-left px-4 py-3 rounded-card border-2 transition",
                selected===ep.id ? "border-primary bg-primary-soft" : "border-border bg-white hover:border-ink-3"].join(" ")}>
              <div className="flex items-center justify-between">
                <div className="text-[13.5px] font-medium text-ink">{ep.title}</div>
                {selected===ep.id && <Icon d={I.check} size={16} className="text-primary shrink-0" stroke={2.5}/>}
              </div>
              <div className="text-[11.5px] text-ink-3 mt-0.5">{ep.topic} · {ep.id}</div>
            </button>
          ))}
        </div>
        <div className="px-6 py-4 border-t border-border flex items-center justify-end gap-2">
          <button onClick={onClose} className="h-10 px-4 rounded-pill text-[13px] font-medium text-ink hover:bg-lavender transition">Cancel</button>
          {selected ? (
            <a href="BriefDetail.html" className="h-10 px-5 rounded-pill bg-primary hover:bg-primary-hover text-white text-[13px] font-medium inline-flex items-center gap-2 transition shadow-[0_6px_14px_-4px_rgba(107,78,255,0.55)]">
              Build Brief<Icon d={I.chevR} size={14} stroke={2}/>
            </a>
          ) : (
            <button disabled className="h-10 px-5 rounded-pill bg-ink-3 text-white text-[13px] font-medium inline-flex items-center gap-2 cursor-not-allowed">
              Build Brief<Icon d={I.chevR} size={14} stroke={2}/>
            </button>
          )}
        </div>
      </div>
    </div>
  );
};

const BriefListPage = () => {
  const [filter, setFilter] = useState("All");
  const [showModal, setShowModal] = useState(false);
  const filtered = filter === "All" ? BRIEFS : BRIEFS.filter(b => b.status === filter);

  const stats = [
    { label:"Total Briefs", value:BRIEFS.length, color:"#1A1A2E" },
    { label:"In Review", value:BRIEFS.filter(b=>b.status==="In Review").length, color:"#A86A00" },
    { label:"Approved", value:BRIEFS.filter(b=>b.status==="Approved").length, color:"#34A853" },
    { label:"Drafts", value:BRIEFS.filter(b=>b.status==="Draft").length, color:"#5F6368" },
  ];

  return (
    <div className="h-full flex flex-col bg-lavender">
      {showModal && <NewBriefModal onClose={() => setShowModal(false)}/>}
      <Topbar breadcrumb={["Workspace","Brief Builder"]} actions={
        <button onClick={() => setShowModal(true)} className="ml-1 h-9 px-4 rounded-pill bg-primary hover:bg-primary-hover text-white text-[13px] font-medium inline-flex items-center gap-2 transition shadow-[0_4px_12px_-2px_rgba(107,78,255,0.5)]">
          <Icon d={I.plus} size={15} stroke={2.5}/>New Brief
        </button>
      }/>
      <main className="flex-1 overflow-y-auto">
        <div className="max-w-[1180px] mx-auto px-8 py-8">
          <div className="mb-6">
            <div className="mono text-[11px] uppercase tracking-[0.18em] text-ink-2 mb-1.5">Content Marketer</div>
            <h1 className="text-[28px] font-bold display leading-tight">Brief Builder</h1>
            <p className="text-[13.5px] text-ink-2 mt-1">Manage episode briefs — view previously generated briefs or create a new one for any approved episode topic.</p>
          </div>

          <div className="grid grid-cols-4 gap-3 mb-6">
            {stats.map(s => (
              <div key={s.label} className="bg-white rounded-card shadow-card px-4 py-3">
                <div className="text-[24px] font-bold display" style={{color:s.color}}>{s.value}</div>
                <div className="text-[12px] text-ink-2 mt-0.5">{s.label}</div>
              </div>
            ))}
          </div>

          <div className="flex items-center gap-2 mb-4">
            {FILTERS.map(f => {
              const count = f==="All" ? BRIEFS.length : BRIEFS.filter(b=>b.status===f).length;
              return (
                <button key={f} onClick={() => setFilter(f)}
                  className={["h-8 px-4 rounded-pill text-[12.5px] font-medium transition",
                    filter===f ? "bg-ink text-white" : "bg-white border border-border text-ink-2 hover:text-ink hover:border-ink-3"].join(" ")}>
                  {f} <span className={filter===f?"opacity-60":"opacity-50"}>({count})</span>
                </button>
              );
            })}
          </div>

          {filtered.length > 0 ? (
            <div className="space-y-3">
              {filtered.map(brief => <BriefCard key={brief.id} brief={brief}/>)}
            </div>
          ) : (
            <div className="bg-white rounded-card shadow-card px-8 py-12 text-center">
              <div className="w-12 h-12 rounded-full bg-lavender grid place-items-center mx-auto mb-4">
                <Icon d={I.brief} size={20} className="text-ink-3"/>
              </div>
              <div className="text-[15px] font-semibold text-ink mb-1">No briefs with this status</div>
              <p className="text-[13px] text-ink-2">Try a different filter or create a new brief.</p>
            </div>
          )}
          <div className="text-[11px] text-ink-3 mono mt-8">podium · content marketer · brief builder</div>
        </div>
      </main>
    </div>
  );
};

function App() {
  return (
    <div className="h-screen w-screen flex" data-screen-label="Brief List">
      <Sidebar active="brief"/>
      <div className="flex-1 min-w-0 flex flex-col"><BriefListPage/></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>window.parent.postMessage({type:'podium_navigate',page:'screens/BriefList.html'},'*');</script></body>
</html>
