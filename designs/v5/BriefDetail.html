<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Prototype data ──────────────────────────────────────────── */
const QUESTION_SECTION_META = {

  thesis:{label:"Thesis",helper:"What's the claim",bg:"#FFE0DA",fg:"#B92E22"},

};

const makeQuestion = (text, section="proof", vir=82, flags=[]) => ({ text, section, vir, flags });

  makeQuestion("You've described procurement as the 'silent killer' of AI POCs — what's the most common failure mode you've seen firsthand?","origin",88),

const PERSONA_RESEARCH_ANGLES = [
  {
    id:"budget",
    label:"Budget ownership",
    finding:"CIO personas respond well to questions that clarify where AI spend actually lives once a pilot moves toward production.",
    question:"Where does AI tooling budget usually sit after the pilot — IT, the business unit, or a shared transformation budget?",

];

  { id:1, text:"Hi Fizza — I've reviewed the brief. The strongest path is to keep this conversation concrete: failed deals, procurement mechanics, and advice for CIO buyers.", type:"agent" },

];

/* ── Inline editable text (Notion-style) ────────────────────── */
const InlineEdit = ({ value, onChange, placeholder="Click to edit…", className="" }) => {
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(value);
  const ref = useRef(null);

  useEffect(() => {
    if (editing && ref.current) {
      const ta = ref.current;
      ta.focus();
      ta.style.height = "auto";
      ta.style.height = ta.scrollHeight + "px";
      const len = ta.value.length;
      ta.setSelectionRange(len, len);
    }
  }, [editing]);

  const commit = () => {
    setEditing(false);
    const v = draft.trim();
    if (v && v !== value) onChange(v); else setDraft(value);
  };

  if (editing) {
    return (
      <textarea ref={ref} value={draft}
        onChange={e => { setDraft(e.target.value); const t=e.target; t.style.height="auto"; t.style.height=t.scrollHeight+"px"; }}
        onBlur={commit}
        onKeyDown={e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();commit();} if(e.key==="Escape"){setDraft(value);setEditing(false);} }}
        style={{overflow:"hidden",resize:"none",lineHeight:"inherit",background:"#FAFAFF",borderBottom:"2px solid #6B4EFF",borderRadius:"4px"}}
        className={`w-full outline-none px-1 -mx-1 ${className}`}
      />
    );
  }

  return (
    <span onClick={()=>{setDraft(value);setEditing(true);}}
      title="Click to edit"
      className={`block cursor-text px-1 -mx-1 py-0.5 rounded-[4px] transition-colors editable-hover ${className}`}>
      {value||<span className="text-ink-3 italic">{placeholder}</span>}
    </span>
  );
};

/* ── Editable list with add / remove ────────────────────────── */
const EditableList = ({ items, onChange, renderRow, addLabel="+ Add point", createItem=v=>v }) => {
  const [adding, setAdding] = useState(false);
  const [newVal, setNewVal] = useState("");
  const addRef = useRef(null);

  useEffect(()=>{ if(adding&&addRef.current) addRef.current.focus(); },[adding]);

  const update = (i,v) => { const n=[...items]; n[i]=v; onChange(n); };
  const remove = i => onChange(items.filter((_,j)=>j!==i));
  const add    = () => { const v=newVal.trim(); if(v) onChange([...items,createItem(v,items)]); setNewVal(""); setAdding(false); };

  return (
    <div>
      {items.map((item,i) => renderRow(item, i, v=>update(i,v), ()=>remove(i)))}
      {adding ? (
        <div className="px-5 py-3 border-t border-border" style={{background:"#FAFAFF"}}>
          <textarea ref={addRef} value={newVal} rows={2}
            onChange={e=>setNewVal(e.target.value)}
            onBlur={()=>{ newVal.trim()?add():setAdding(false); }}
            onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();add();} if(e.key==="Escape")setAdding(false); }}
            placeholder="Type and press Enter to add…"
            className="w-full outline-none text-[13.5px] text-ink leading-relaxed resize-none bg-transparent placeholder:text-ink-3"
            style={{borderBottom:"1px solid #6B4EFF"}}
          />
        </div>
      ) : (
        <button onClick={()=>setAdding(true)}
          className="w-full px-5 py-2.5 flex items-center gap-1.5 text-[12px] text-ink-3 hover:text-primary hover:bg-lavender transition border-t border-border opacity-80 hover:opacity-100">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          {addLabel}
        </button>
      )}
    </div>
  );
};

const QuestionTag = ({ children, tone }) => {

const AgentMark = ({ size=24 }) => (
  <div className="rounded-full shrink-0 flex items-center justify-center" style={{width:size,height:size,background:"#1A1A2E"}}>

const AGENT_CHIPS = [
  {id:"add-question",label:"Add question",icon:I.plus,prompt:"Add one more interview question for this CIO guest persona."},
  {id:"discussion-areas",label:"Find discussion areas",icon:I.search,prompt:"Search for more discussion areas based on the CIO guest persona."},
  {id:"persona-angle",label:"Persona angle",icon:I.search,prompt:"What is the strongest persona angle for this guest?"},
  {id:"tighten-flow",label:"Tighten flow",icon:I.check,prompt:"How should I tighten the question flow?"},
];

const BriefAgent = ({ onAddQuestion, onAddArea }) => {
  const [open,     setOpen]     = useState(true);
  const [msgs,     setMsgs]     = useState(AGENT_INSIGHTS);
  const [inputVal, setInputVal] = useState("");
  const threadRef = useRef(null);
  const inputRef = useRef(null);

  const scrollThread = () => setTimeout(()=>{ if(threadRef.current) threadRef.current.scrollTop=threadRef.current.scrollHeight; },80);
  const appendAgent = text => {
    setMsgs(p=>[...p,{id:Date.now()+Math.random(),text,type:"agent"}]);
    scrollThread();
  };
  const applyChip = chip => {
    setInputVal(chip.prompt);
    setTimeout(()=>inputRef.current?.focus(), 0);
  };
  const answerQuery = v => {
    const lower = v.toLowerCase();
    if(lower.includes("question")){
      const angle = PERSONA_RESEARCH_ANGLES[0];
      onAddQuestion(makeQuestion(angle.question,"proof",83));
      appendAgent("I added a budget ownership question to Interview Questions. It gives the CIO a concrete way to explain what happens after an AI pilot succeeds.");
      return;
    }
    if(lower.includes("discussion")){
      const angle = PERSONA_RESEARCH_ANGLES[2];
      onAddArea(angle.area);
      appendAgent("I added a discussion area around CFO objections and the AI vendor business case. That should make the brief feel more executive and less generic.");
      return;
    }
    if(lower.includes("persona") || lower.includes("angle")){
      appendAgent("For this guest persona, the strongest angle is the tension between AI urgency and procurement risk. Keep the conversation around budget ownership, security review, and hidden veto holders.");
      return;
    }
    if(lower.includes("flow") || lower.includes("tighten")){
      appendAgent("The question flow is strongest if it moves from a concrete failed deal, into procurement mechanics, then into advice. Avoid opening with broad opinions.");
      return;
    }
    appendAgent("I would keep this brief focused on concrete procurement stories, budget ownership, security review, and what a CIO would advise other buyers to do differently.");
  };

  const send = () => {
    const v = inputVal.trim(); if(!v) return;
    setMsgs(p=>[...p,
      {id:Date.now(), text:v, type:"user"},
    ]);
    setInputVal("");
    setTimeout(()=>answerQuery(v), 0);
    scrollThread();
  };

  return (
    <div className="bg-white rounded-card shadow-card overflow-hidden border border-[#E6E2FF]">
      <button className="w-full flex items-start gap-3 px-4 py-4 border-b border-[#DDD8FF] text-left agent-shimmer"
        onClick={()=>setOpen(o=>!o)}>
        <AgentMark size={30}/>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2">
            <div className="text-[14px] font-semibold text-ink leading-tight display">Brief Agent</div>
            <span className="inline-flex items-center gap-1 rounded-pill bg-white/80 px-2 py-0.5 text-[10.5px] font-semibold text-primary">
              <span className="w-1.5 h-1.5 rounded-full bg-primary"/>Live
            </span>
          </div>
          <div className="text-[11.5px] text-ink-2 mt-1">{open?"Ask, refine, or add to the brief":"Click to expand"}</div>
        </div>
        <svg className="mt-1" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#5F6368" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <path d={open?"M18 15l-6-6-6 6":"M6 9l6 6 6-6"}/>
        </svg>
      </button>

      {open && (<>
        {/* Suggested chips */}
        <div className="px-4 pt-3 pb-3 border-b border-border">
          <div className="flex flex-wrap gap-2">
            {AGENT_CHIPS.map(chip=>(
              <button key={chip.id} onClick={()=>applyChip(chip)}
                className="h-8 px-3 rounded-pill border border-border bg-white text-[11.5px] font-medium text-ink-2 hover:text-primary hover:border-primary/40 hover:bg-primary-soft/40 transition inline-flex items-center gap-1.5">
                <Icon d={chip.icon} size={12}/>
                {chip.label}
              </button>
            ))}
          </div>
        </div>

        {/* Thread */}
        <div ref={threadRef} className="agent-thread px-4 pt-4 pb-3 space-y-3 overflow-y-auto bg-[#FCFCFF]" style={{maxHeight:360}}>
          {msgs.map(m => {
            if (m.type==="user") return (
              <div key={m.id} className="flex justify-end">
                <div className="max-w-[86%] px-3 py-2 rounded-[14px] rounded-tr-[4px] text-[12.5px] leading-relaxed text-white shadow-[0_5px_14px_-10px_rgba(107,78,255,0.7)]" style={{background:"#6B4EFF"}}>{m.text}</div>
              </div>
            );
            return (
              <div key={m.id} className="flex items-start gap-2.5">
                <AgentMark size={20}/>
                <div className="flex-1 min-w-0 rounded-[14px] rounded-tl-[4px] bg-white border border-border px-3 py-2 shadow-[0_1px_2px_rgba(26,26,46,0.03)]">
                  <p className="text-[12.5px] text-ink leading-relaxed">
                    {m.text}
                  </p>
                </div>
              </div>
            );
          })}
        </div>

        {/* Input */}
        <div className="px-4 py-3 border-t border-border bg-white">
          <div className="flex items-center gap-2 rounded-pill border border-border bg-lavender/60 px-3 py-1.5 focus-within:border-primary focus-within:bg-white transition">
          <input ref={inputRef} className="flex-1 text-[12.5px] outline-none bg-transparent text-ink placeholder:text-ink-3"
            placeholder="Ask about this brief…"
            value={inputVal}
            onChange={e=>setInputVal(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&send()}
          />
          <button onClick={send} disabled={!inputVal.trim()}
            className="w-7 h-7 rounded-full grid place-items-center transition shrink-0"
            style={{background:inputVal.trim()?"#6B4EFF":"#E2E2EE"}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6l6 6-6 6"/></svg>
          </button>
          </div>
        </div>
      </>)}
    </div>
  );
};

                              </div>
                            )}
                          />
                        </div>
                      </React.Fragment>
                    ))}
                    <div className="rounded-input p-4" style={{background:"#F6F2FF",border:"1px solid #DCD3FF"}}>
                      <div className="mono text-[10px] uppercase tracking-[0.14em] text-primary mb-2.5">Quick checklist to share with guest</div>
                      <div className="grid grid-cols-2 gap-x-6 gap-y-1.5">
                        {["Camera at eye level","Good front lighting","Headphones/earbuds","Quiet room","Clean background","Stable internet connection"].map((c,i)=>(
                          <div key={i} className="flex items-center gap-2 text-[12.5px] text-ink">
                            <Icon d={I.check} size={13} stroke={2.5} className="text-primary shrink-0"/>{c}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </section>
            </div>

            {/* Right sidebar */}
            <aside className="w-[330px] shrink-0 self-start sticky top-6 space-y-4">

              {/* Brief Agent */}
              <BriefAgent
                onAddQuestion={q=>setQuestions(prev=>[...prev,(typeof q==="string"?makeQuestion(q,"proof",76):q)])}
                onAddArea={area=>setDiscAreas(prev=>[...prev,area])}
              />

              {/* Submit card */}
              <div className="bg-white rounded-card shadow-card p-5">
                <div className="mono text-[10.5px] uppercase tracking-[0.14em] text-ink-2 mb-1">Submit for Review</div>
                <div className="text-[15px] font-semibold display mb-3">Send to Marketing Manager</div>
                <div className="flex items-center gap-3 p-3 rounded-input bg-lavender mb-4">
                  <Avatar name="Jen Mendoza" size={32}/>
                  <div>
                    <div className="text-[13px] font-semibold text-ink">Jen Mendoza</div>
                    <div className="text-[11px] text-ink-2">Marketing Manager</div>
                  </div>
                </div>
                <div className="rounded-input bg-lavender/70 p-3 mb-4">
                  <div className="mono text-[10px] uppercase tracking-[0.14em] text-ink-3 mb-3">Personas included</div>
                  <div className="space-y-3">
                    <PersonaReviewItem title="Host" persona={REVIEW_PERSONAS.host}/>
                    <div className="h-px bg-border"/>
                    <PersonaReviewItem title="Guest" persona={REVIEW_PERSONAS.guest}/>
                  </div>
                </div>
                <div className="space-y-2 text-[12px] mb-4">
                  {[
                    ["Questions", questions.length + " generated"],
                    ["Discussion areas", discAreas.length + " areas"],
                    ["Personas", "Host + guest included"],
                    ["Recording date", recordDate],
                    ["Outreach email", "Ready to send"],
                    ["Visual instructions", "Attached"],
                  ].map(([k,v]) => (
                    <div key={k} className="flex justify-between items-center">
                      <span className="text-ink-3">{k}</span>
                      <span className="font-medium text-ink">{v}</span>
                    </div>
                  ))}
                </div>
                <button onClick={()=>setSubmitted(true)}
                  className="w-full h-11 rounded-pill bg-primary hover:bg-primary-hover transition text-white text-[13.5px] font-medium inline-flex items-center justify-center gap-2"
                  style={{boxShadow:"0 6px 14px -4px rgba(107,78,255,0.55)"}}>
                  <Icon d={I.send} size={15} stroke={2}/>Submit for Review
                </button>
                <a href="BriefList.html" className="w-full h-10 mt-2 rounded-pill border border-border text-[13px] font-medium text-ink hover:bg-lavender transition inline-flex items-center justify-center">
                  Back to Briefs
                </a>
              </div>

              {/* Activity */}
              <div className="bg-white rounded-card shadow-card p-5">
                <div className="mono text-[10.5px] uppercase tracking-[0.12em] text-ink-3 mb-3">Brief activity</div>
                <div className="space-y-2 text-[12px] text-ink-2">
                  {[
                    {dot:"bg-primary",text:<><span className="text-ink font-medium">AI</span> generated brief <span className="text-ink-3 mono">· 2m ago</span></>},
                    {dot:"bg-success",text:<><span className="text-ink font-medium">Fizza</span> opened episode <span className="text-ink-3 mono">· 3m ago</span></>},
                    {dot:"bg-ink-3",  text:<>Episode approved by manager <span className="text-ink-3 mono">· May 21</span></>},
                  ].map((item,i)=>(
                    <div key={i} className="flex items-start gap-2.5">
                      <span className={`w-1.5 h-1.5 rounded-full ${item.dot} mt-1.5 shrink-0`}/>
                      <span>{item.text}</span>
                    </div>
                  ))}
                </div>
              </div>
            </aside>
          </div>
          <div className="text-[11px] text-ink-3 mono mt-8">podium · content marketer · brief builder · EP-006</div>
        </div>
      </main>
    </div>
  );
};

function App() {
  return (
    <div className="h-screen w-screen flex" data-screen-label="Brief Detail">
      <Sidebar active="brief"/>
      <div className="flex-1 min-w-0 flex flex-col"><BriefDetailPage/></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>window.parent.postMessage({type:'podium_navigate',page:'screens/BriefDetail.html'},'*');</script></body>
</html>
