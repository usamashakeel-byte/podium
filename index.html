<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podium AI — Screen Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #1A1A2E;
      --ink-2:      #5F6368;
      --ink-3:      #ADADBE;
      --primary:    #6B4EFF;
      --primary-soft: #EDE9FF;
      --border:     #E2E2EE;
      --lavender:   #EEEEF8;
      --white:      #ffffff;
      --sidebar-w:  260px;
    }

    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--lavender); color: var(--ink); }

    /* ── Layout ── */
    .shell { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .nav {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .nav-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo-badge {
      width: 40px; height: 40px;
      border-radius: 11px;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 1px 2px rgba(26,26,46,0.08), 0 4px 12px rgba(26,26,46,0.06);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1;
    }

    .logo-text span { color: var(--primary); }

    .nav-tag {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--ink-3);
      margin-top: 4px;
    }

    .nav-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 12px 0 20px;
    }

    .nav-scroll::-webkit-scrollbar { width: 4px; }
    .nav-scroll::-webkit-scrollbar-track { background: transparent; }
    .nav-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .nav-section-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--ink-3);
      padding: 12px 20px 6px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      margin: 1px 8px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-2);
      border: none;
      background: none;
      width: calc(100% - 16px);
      text-align: left;
      transition: background 0.1s, color 0.1s;
    }

    .nav-item:hover { background: var(--lavender); color: var(--ink); }

    .nav-item.active {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .nav-item .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
      flex-shrink: 0;
    }

    .nav-item.active .dot { opacity: 1; }

    /* ── Main area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--lavender);
    }

    /* ── Topbar ── */
    .topbar {
      height: 48px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-2);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-path {
      font-size: 11px;
      color: var(--ink-3);
      font-weight: 400;
    }

    .btn-open {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--white);
      font-size: 12px;
      font-weight: 500;
      color: var(--ink);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.1s, border-color 0.1s;
      flex-shrink: 0;
    }

    .btn-open:hover { background: var(--lavender); border-color: #c8c8de; }

    /* ── iFrame ── */
    .frame-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    #frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .frame-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--lavender);
      font-size: 13px;
      color: var(--ink-3);
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .frame-loading.hidden { opacity: 0; }
  </style>
</head>
<body>
<div class="shell">

  <!-- Sidebar -->
  <nav class="nav">
    <div class="nav-header">
      <div class="logo">
        <div class="logo-badge">
          <svg viewBox="0 0 40 40" width="40" height="40" fill="none">
            <rect x="16" y="8" width="8" height="15" rx="4" fill="#FFFFFF"/>
            <path d="M11 19a9 9 0 0018 0" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <path d="M20 28v4" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M16 32h8" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="logo-text">Podium AI<span>.</span></div>
          <div class="nav-tag">Design Preview</div>
        </div>
      </div>
    </div>

    <div class="nav-scroll">

      <div class="nav-section-label">Auth</div>
      <button class="nav-item active" data-src="screens/Login.html" onclick="loadScreen(this)">
        <span class="dot"></span> Sign In
      </button>

      <div class="nav-section-label">Content Marketer</div>
      <button class="nav-item" data-src="screens/CMDashboard.html" onclick="loadScreen(this)">
        <span class="dot"></span> Dashboard
      </button>
      <button class="nav-item" data-src="screens/IdeationList.html" onclick="loadScreen(this)">
        <span class="dot"></span> Ideation
      </button>
      <button class="nav-item" data-src="screens/IdeationForm.html" onclick="loadScreen(this)">
        <span class="dot"></span> Generate Idea
      </button>
      <button class="nav-item" data-src="screens/IdeationSubmit.html" onclick="loadScreen(this)">
        <span class="dot"></span> Send for Approval
      </button>
      <button class="nav-item" data-src="screens/EpisodeTopics.html" onclick="loadScreen(this)">
        <span class="dot"></span> Episode Topics
      </button>
      <button class="nav-item" data-src="screens/EpisodeDetail.html" onclick="loadScreen(this)">
        <span class="dot"></span> Episode Detail
      </button>
      <button class="nav-item" data-src="screens/TopicGeneration.html" onclick="loadScreen(this)">
        <span class="dot"></span> Topic Generation
      </button>
      <button class="nav-item" data-src="screens/BriefList.html" onclick="loadScreen(this)">
        <span class="dot"></span> Brief Builder
      </button>
      <button class="nav-item" data-src="screens/BriefDetail.html" onclick="loadScreen(this)">
        <span class="dot"></span> Brief Detail
      </button>
      <button class="nav-item" data-src="screens/RecordingsList.html" onclick="loadScreen(this)">
        <span class="dot"></span> Recordings
      </button>
      <button class="nav-item" data-src="screens/RecordingDetail.html" onclick="loadScreen(this)">
        <span class="dot"></span> Recording Detail
      </button>
      <button class="nav-item" data-src="screens/RecordingBriefLink.html" onclick="loadScreen(this)">
        <span class="dot"></span> Link Recordings to Briefs
      </button>

      <div class="nav-section-label">Marketing Manager</div>
      <button class="nav-item" data-src="screens/MMDashboard.html" onclick="loadScreen(this)">
        <span class="dot"></span> Dashboard
      </button>
      <button class="nav-item" data-src="screens/MMIdeations.html" onclick="loadScreen(this)">
        <span class="dot"></span> Ideation Reviews
      </button>
      <button class="nav-item" data-src="screens/MMBriefs.html" onclick="loadScreen(this)">
        <span class="dot"></span> Brief Reviews
      </button>
      <button class="nav-item" data-src="screens/MMReviewDetail.html" onclick="loadScreen(this)">
        <span class="dot"></span> Review Detail
      </button>

      <div class="nav-section-label">Settings &amp; Config</div>
      <button class="nav-item" data-src="screens/Configuration.html" onclick="loadScreen(this)">
        <span class="dot"></span> Configuration
      </button>
      <button class="nav-item" data-src="screens/BrandVoice.html" onclick="loadScreen(this)">
        <span class="dot"></span> Brand Library
      </button>
      <button class="nav-item" data-src="screens/Hosts.html" onclick="loadScreen(this)">
        <span class="dot"></span> Hosts
      </button>
      <button class="nav-item" data-src="screens/Settings.html" onclick="loadScreen(this)">
        <span class="dot"></span> User Management
      </button>

      <div class="nav-section-label">Extra Screens</div>
      <button class="nav-item" data-src="screens/extra/Studio.html" onclick="loadScreen(this)">
        <span class="dot"></span> Studio
      </button>
      <button class="nav-item" data-src="screens/extra/TopicReview.html" onclick="loadScreen(this)">
        <span class="dot"></span> Topic Review
      </button>
      <button class="nav-item" data-src="screens/extra/BriefReady.html" onclick="loadScreen(this)">
        <span class="dot"></span> Brief Ready
      </button>
      <button class="nav-item" data-src="screens/extra/SocialContentBuilder.html" onclick="loadScreen(this)">
        <span class="dot"></span> Social Content Builder
      </button>

    </div>
  </nav>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">
        <span id="screen-title">Sign In</span>
        <span class="topbar-path" id="screen-path"> · screens/Login.html</span>
      </div>
      <a id="open-link" href="screens/Login.html" target="_blank" class="btn-open">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Open in tab
      </a>
    </div>

    <div class="frame-wrap">
      <div class="frame-loading" id="loading">Loading…</div>
      <iframe id="frame" src="screens/Login.html" onload="frameLoaded()"></iframe>
    </div>
  </div>

</div>

<script>
  function loadScreen(btn) {
    const src = btn.dataset.src;
    const title = btn.textContent.trim();
    const section = btn.previousElementSibling;

    // Update active state
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    // Update topbar
    document.getElementById('screen-title').textContent = title;
    document.getElementById('screen-path').textContent = ' · ' + src;
    document.getElementById('open-link').href = src;

    // Show loading, load frame
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('frame').src = src;
  }

  function frameLoaded() {
    document.getElementById('loading').classList.add('hidden');
  }
</script>
</body>
</html>
