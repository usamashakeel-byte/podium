                          <div className="flex items-center gap-2 flex-wrap mb-1.5">
                            <span className="mono text-[10.5px] uppercase tracking-[0.12em] font-semibold text-ink-2">#{String(t.idx).padStart(2,"0")}</span>
                            <ScoreBadge kind="rel" value={t.rel}/>
                            <ScoreBadge kind="vir" value={t.vir}/>
                            {t.evidence?.map(e=><EvidencePill key={e} type={e}/>)}
                          </div>
                          <div className="text-[14px] font-semibold display">{t.title}</div>
                        </div>
                        <div className="shrink-0 text-right">
                          <div className="text-[11px] text-ink-3 mono mb-0.5">Episode count</div>
                          <div className="text-[22px] font-bold text-primary">{t.episodes}</div>
                          <div className="text-[11px] text-ink-3">episodes</div>
                        </div>
                      </div>
                      <div className="mt-3 pt-3 border-t border-success/20 space-y-2">
                        <div className="text-[10px] mono uppercase tracking-[0.14em] text-ink-3 mb-0.5">Episodes</div>
                        {t.subtopics.map((ep, ei) => {const cp=getCurrentPersona(ep);const ch=getCurrentHost(ep,t.idx,ei);return(
                          <div key={ei} className="rounded-input border border-success/10 bg-white/80 p-3">
                            <div className="flex items-center gap-2 mb-2.5">
                              <span className="mono text-[9.5px] font-bold text-success bg-success/10 px-2 py-0.5 rounded-pill shrink-0">E{ei+1}</span>
                              <span className="text-[12.5px] font-semibold text-ink leading-snug">{ep.title}</span>
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                              <div className="rounded-input bg-lavender/60 border border-transparent hover:border-primary/20 hover:bg-primary-soft/20 px-3 py-2.5 cursor-pointer transition" onClick={()=>setHostModal({ti:t.idx,ei,ep})}>
                                <div className="flex items-center justify-between mb-2">
                                  <div className="text-[9px] mono uppercase tracking-[0.12em] text-ink-3">Suggested Host Fit</div>
                                  <button onClick={e=>{e.stopPropagation();setHostModal({ti:t.idx,ei,ep});}} className="text-[10px] text-primary font-medium hover:underline transition">Change</button>
                                </div>
                                <div className="flex items-center gap-2 mb-1.5">
                                  <Avatar name={ch.name} size={26}/>
                                  <div className="min-w-0">
                                    <div className="text-[12px] font-semibold text-ink leading-tight truncate">{ch.name}</div>
                                    <div className="text-[10.5px] text-ink-3 leading-tight truncate">{ch.role}</div>
                                  </div>
                                </div>
                                <div className="text-[10.5px] text-ink-2 italic mb-2 truncate">"{ch.tone}"</div>
                                {ch.manualPick?<div className="flex items-center gap-1.5 py-0.5"><span className="w-1.5 h-1.5 rounded-full bg-ink-3"/><span className="text-[10px] text-ink-3 font-medium">Manually selected</span></div>:<FitBar score={ch.fit} color="rgba(107,78,255,0.55)"/>}
                                <div className="flex items-center justify-between mt-1">
                                  <span className="mono text-[9px] font-bold text-primary/70">{ch.manualPick?"":ch.fit+"% fit"}</span>
                                  <span className="text-[10px] text-primary font-medium inline-flex items-center gap-0.5">View details<Icon d={I.chevR} size={9}/></span>
                                </div>
                              </div>
                              <div className="rounded-input bg-lavender/60 border border-transparent hover:border-primary/20 hover:bg-primary-soft/20 px-3 py-2.5 cursor-pointer transition" onClick={()=>setPersonaModal({ti:t.idx,ei,ep})}>
                                <div className="mb-2">
                                  <div className="text-[9px] mono uppercase tracking-[0.12em] text-ink-3">Guest Persona</div>
                                </div>
                                <div className="mb-1.5">
                                  <div className="text-[12px] font-semibold text-ink leading-tight">{cp.title}</div>
                                  <div className="text-[10.5px] text-ink-3 leading-tight mt-0.5">{cp.stage} · {cp.seniority}</div>
                                </div>
                                <div className="text-[10.5px] text-ink-2 leading-snug mb-2" style={{display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{cp.why}</div>
                                <FitBar score={cp.fit} color={fitColor(cp.fit).bar}/>
                                <div className="flex items-center justify-between mt-1">
                                  <span className="mono text-[9px] font-bold" style={{color:fitColor(cp.fit).fg}}>{cp.fit}% fit</span>
                                  <span className="text-[10px] text-primary font-medium inline-flex items-center gap-0.5">View details<Icon d={I.chevR} size={9}/></span>
                                </div>
                              </div>
                            </div>
                          </div>
                        );})}
                      </div>
                    </div>
                  ))}
                </div>
              </section>
            </div>

            {/* Submit sidebar */}
            <aside className="bg-white rounded-card shadow-card p-5 self-start sticky top-6 space-y-4">
              <div>
                <div className="text-[10.5px] mono uppercase tracking-[0.14em] text-ink-2 mb-1">Approval Request</div>
                <div className="text-[16px] font-semibold display">Send to Marketing Manager</div>
              </div>
              <div className="flex items-center gap-3 p-3 rounded-input bg-lavender">
                <Avatar name="Jen Mendoza" size={36}/>
                <div>
                  <div className="text-[13px] font-semibold text-ink">Jen Mendoza</div>
                  <div className="text-[11.5px] text-ink-2">Marketing Manager</div>
                </div>
              </div>
              <div className="space-y-2 text-[12.5px]">
                <div className="flex justify-between"><span className="text-ink-3">Topics</span><span className="font-semibold text-ink">{SELECTED_TOPICS.length}</span></div>
                <div className="flex justify-between"><span className="text-ink-3">Total episodes</span><span className="font-semibold text-primary">{totalEpisodes}</span></div>
                <div className="flex justify-between"><span className="text-ink-3">Segment</span><span className="font-semibold text-ink">Sweetspot</span></div>
              </div>
              <div className="rounded-input border border-success/30 bg-success/5 px-3 py-2.5 space-y-1.5">
                <div className="text-[10px] mono uppercase tracking-[0.12em] text-success/80 font-semibold">Included with submission</div>
                <div className="flex items-center gap-2 text-[11.5px] text-ink-2">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#34A853" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5L20 7"/></svg>
                  Suggested host fit per episode
                </div>
                <div className="flex items-center gap-2 text-[11.5px] text-ink-2">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#34A853" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12l5 5L20 7"/></svg>
                  Guest persona + fit score per episode
                </div>
              </div>
              <button onClick={() => setSubmitted(true)}
                className="w-full h-11 rounded-pill bg-primary hover:bg-primary-hover transition text-white text-[13.5px] font-medium inline-flex items-center justify-center gap-2 shadow-[0_6px_14px_-4px_rgba(107,78,255,0.55)]">
                <Icon d={I.send} size={15} stroke={2}/>Submit for Approval
              </button>
              <a href="TopicGeneration.html" className="w-full h-10 rounded-pill border border-border text-[13px] font-medium text-ink hover:bg-lavender transition inline-flex items-center justify-center">
                Back to Topic Plan
              </a>
            </aside>
          </div>
          <div className="text-[11px] text-ink-3 mono mt-8">podium · content marketer · ideation step 3</div>
        </div>
      </main>
      {personaModal&&<PersonaModal persona={getCurrentPersona(personaModal.ep)} episodeTitle={personaModal.ep.title} onClose={()=>setPersonaModal(null)}/>}
      {hostModal&&<HostModal host={getCurrentHost(hostModal.ep,hostModal.ti,hostModal.ei)} originalHost={hostModal.ep.host} episodeTitle={hostModal.ep.title} onChangeHost={host=>handleSelectHost(hostModal.ti,hostModal.ei,host)} onClose={()=>setHostModal(null)}/>}
    </div>
  );
};

function App() {
  return (
    <div className="h-screen w-screen flex" data-screen-label="Ideation Submit">
      <Sidebar active="ideation"/>
      <div className="flex-1 min-w-0 flex flex-col"><IdeationSubmitPage/></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>window.parent.postMessage({type:'podium_navigate',page:'screens/IdeationSubmit.html'},'*');</script></body>
</html>
