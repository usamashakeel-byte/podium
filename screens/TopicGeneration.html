);

const ScoreBadge = ({ kind, value }) => {
  const grad = kind==="rel" ? "linear-gradient(90deg,#6B4EFF 0%,#B26BFF 100%)" : "linear-gradient(90deg,#FF7A59 0%,#FFB572 100%)";
  const label = kind==="rel" ? "REL" : "VIR";
  return (
    <span className="inline-flex items-center gap-1.5 rounded-pill text-white px-2 py-0.5" style={{ background:grad }}>
      <span className="mono uppercase tracking-wider opacity-95 text-[9px]">{label}</span>
      <span className="font-bold leading-none text-[12px]">{value}</span>
    </span>
  );
};

const SourcePill = ({ children }) => (
  <span className="px-2 py-0.5 rounded-pill text-[10.5px] font-medium" style={{ background:"#F1F1F8", color:"#5F6368" }}>{children}</span>
);
const EVIDENCE_LABELS={trending:{label:"Trending",bg:"#FFF3CD",fg:"#92600A"},viral:{label:"High virality",bg:"#FFE0DA",fg:"#B92E22"},search:{label:"Search demand",bg:"#D1E8FF",fg:"#0D5FAB"},pain:{label:"Pain point",bg:"#FFDDE1",fg:"#AD1F35"},emerging:{label:"Emerging",bg:"#D4EDDA",fg:"#1A5C2B"},evergreen:{label:"Evergreen",bg:"#D0F0EE",fg:"#0D6B62"},data:{label:"Data-backed",bg:"#E8E8F8",fg:"#3D3D8F"},contrarian:{label:"Contrarian",bg:"#EDE9FF",fg:"#5A3FE0"},community:{label:"Community signal",bg:"#FFF9C4",fg:"#7A6400"},gap:{label:"Competitor gap",bg:"#F0F0F0",fg:"#5F5F5F"}};
const EvidencePill=({type})=>{const e=EVIDENCE_LABELS[type];if(!e)return null;return<span className="px-2 py-0.5 rounded-pill text-[10.5px] font-medium" style={{background:e.bg,color:e.fg}}>{e.label}</span>;};

const StepBar = () => {
  const steps = ["Configure", "Topic Plan", "Send for Approval"];
  return (
    <div className="bg-white rounded-card shadow-card px-6 py-4 mb-6">
      <div className="flex items-center">
        {steps.map((s,i)=>{
          const done=i<1; const active=i===1;
          return (
            <React.Fragment key={s}>
              <div className={`flex items-center gap-2 px-3 py-1.5 rounded-pill text-[12px] font-medium whitespace-nowrap ${active?"bg-primary text-white":done?"bg-success/10 text-success":"text-ink-3"}`}>
                <span className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold shrink-0 ${active?"bg-white text-primary":done?"bg-success text-white":"bg-lavender text-ink-3"}`}>
                  {done?<Icon d={I.check} size={10} stroke={3}/>:i+1}
                </span>
                {s}
              </div>
              {i<steps.length-1&&<div className={`flex-1 h-px mx-1.5 ${done?"bg-success":"bg-border"}`}/>}
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
};

const ConfigSummary = () => (
  <aside className="bg-white rounded-card shadow-card px-5 py-5 sticky top-6">
    <div className="mb-5">
      <div className="mono text-[10.5px] uppercase tracking-[0.18em] text-ink-3 mb-1.5">Ideation context</div>
      <h2 className="text-[17px] font-semibold display text-ink leading-tight">AI planning inputs</h2>
      <span className="ai-pill rounded-pill px-2.5 py-1 text-[11px] font-semibold text-ink inline-flex items-center gap-1.5 mt-3">
        <AgentMark/>Analyzed by Podium Agent
      </span>
    </div>

    <div className="space-y-5">
      <section>
        <div className="text-[11px] text-ink-3 mb-1">Segment</div>
        <div className="text-[13.5px] font-semibold text-ink">Sweetspot</div>
        <div className="text-[12px] text-ink-2 mt-1 leading-relaxed">SMBs, SMEs, startups</div>
      </section>

      <section>
        <div className="text-[11px] text-ink-3 mb-1">Audience</div>
        <div className="text-[13.5px] font-semibold text-ink">VP Eng / CTO</div>
        <div className="text-[12px] text-ink-2 mt-1 leading-relaxed">Series B-D SaaS teams scaling AI workloads</div>
      </section>
    </div>
  </aside>
);

const planEpisode = (topic, plan, idx) => {
  const seeded = plan.episodes[idx];
  if (seeded) return seeded;
  const formats = ["Interview","Solo","Panel","Q&A"];
  return {
    title: topic.subtopics[idx],
    format: formats[idx % formats.length],
    promise: "AI-generated angle based on the audience need, source graph, and brand voice.",
    angle: idx < plan.recommendedCount ? "Recommended arc" : "Extended option",
    guest: idx % 2 === 0 ? "Operator guest" : "Internal host deep dive",
  };
};

const TopicGenerationPage = () => {
  const initialSelections = { 3: [0] };
  const [selections, setSelections] = useState(initialSelections);
  const [regenerating, setRegenerating] = useState({});

  const isTopicSelected = idx => !!(selections[idx] && selections[idx].length > 0);
  const isEpisodeSelected = (topicIdx, epIdx) => (selections[topicIdx] || []).includes(epIdx);
  const episodeCount = idx => (selections[idx] || []).length;

  const selectFirstN = (topicIdx, count) => {
    const topic = TOPICS.find(t => t.idx === topicIdx);
    const n = Math.max(1, Math.min(topic.subtopics.length, count));
    setSelections(prev => ({...prev, [topicIdx]: Array.from({length:n},(_,i)=>i)}));
  };

  const toggleTopic = idx => {
    setSelections(prev => {
      if (prev[idx] && prev[idx].length > 0) {
        const next = {...prev}; delete next[idx]; return next;
      }
      const plan = TOPIC_PLANS[idx];
      return {...prev, [idx]: Array.from({length:plan.recommendedCount},(_,i)=>i)};
    });
  };

  const toggleEpisode = (topicIdx, epIdx) => {
    setSelections(prev => {
      const current = prev[topicIdx] || [];
      const next = current.includes(epIdx) ? current.filter(i=>i!==epIdx) : [...current, epIdx].sort((a,b)=>a-b);
      if (next.length === 0) { const copy = {...prev}; delete copy[topicIdx]; return copy; }
      return {...prev, [topicIdx]: next};
    });
  };

  const regenTopic = idx => {
    setRegenerating(prev => ({...prev, [idx]: true}));
    setTimeout(()=>setRegenerating(prev => ({...prev, [idx]: false})), 1300);
  };

  const regenAll = () => {
    setRegenerating(Object.fromEntries(TOPICS.map(t => [t.idx, true])));
    setTimeout(()=>setRegenerating({}), 1500);
  };

  const selectedTopicCount = Object.values(selections).filter(v=>v&&v.length>0).length;
  const totalEpisodes = Object.values(selections).reduce((sum, eps)=>sum+(eps?eps.length:0),0);
  const canProceed = selectedTopicCount > 0;

  return (
    <div className="h-full flex flex-col bg-lavender">
      <Topbar
        breadcrumb={["Workspace","Ideation","New Ideation","Topic Plan"]}
        actions={
          <button onClick={regenAll} className="ml-1 inline-flex items-center gap-2 h-9 px-4 rounded-pill bg-white border border-border text-ink text-[13px] font-medium hover:bg-lavender transition">
            <Icon d={I.refresh} size={14} stroke={2}/>Regenerate all
          </button>
        }
      />

      <main className="flex-1 overflow-y-auto pb-28">
        <div className="max-w-[1180px] mx-auto px-8 py-8">
          <StepBar/>

          <div className="mb-6">
            <div className="mono text-[11px] uppercase tracking-[0.18em] text-ink-2 mb-1.5 flex items-center gap-2">
              Step 2 of 3 · Topic plan
              <span className="ai-pill rounded-pill px-2 py-0.5 text-ink mono text-[10px] inline-flex items-center gap-1">
                <Icon d={I.ideation} size={10}/>AI generated
              </span>
            </div>
            <h1 className="text-[24px] font-bold display leading-tight">Review the AI-generated topic plan</h1>
            <p className="text-[13px] text-ink-2 mt-1.5 max-w-[680px]">
              Select a topic to accept the agent's recommended structure. You can adjust episode count or deselect suggested episodes, but episode creation stays with the AI agent at this stage.
            </p>
          </div>

          <div>
            <div className="min-w-0">
              <div className="bg-white rounded-card shadow-card px-5 py-3.5 mb-5 flex items-center gap-4 flex-wrap">
                <div className="flex items-center gap-1.5 text-[12px] text-ink-2 pr-4 border-r border-border">
                  <AgentMark/>
                  <span className="font-medium text-ink">Sweetspot</span>
                  <span className="text-ink-3">·</span>
                  <span>VP Eng / CTO</span>
                </div>
                <div className="flex items-center gap-5 flex-1 text-[12.5px]">
                  <div className="flex items-center gap-1.5">
                    <span className="w-2 h-2 rounded-full bg-ink-3"/>
                    <span className="text-ink-2"><span className="font-semibold text-ink">{selectedTopicCount} of {TOPICS.length}</span> topics selected</span>
                  </div>
                  <div className="flex items-center gap-1.5">
                    <span className="w-2 h-2 rounded-full bg-success"/>
                    <span className="text-ink-2"><span className="font-semibold text-success">{totalEpisodes}</span> {totalEpisodes === 1 ? "episode" : "episodes"} in plan</span>
                  </div>
                </div>
                <div className="flex items-center gap-2 text-[12px]">
                  <button onClick={()=>setSelections(Object.fromEntries(TOPICS.map(t=>[t.idx,Array.from({length:TOPIC_PLANS[t.idx].recommendedCount},(_,i)=>i)])))} className="text-primary font-medium hover:underline">Use all recommendations</button>
                  <span className="text-ink-3">·</span>
                  <button onClick={()=>setSelections({})} className="text-ink-2 hover:text-ink font-medium hover:underline">Clear all</button>
                </div>
              </div>

              <div className="space-y-4">
                {TOPICS.map(topic => {
              const plan = TOPIC_PLANS[topic.idx];
              const topicSelected = isTopicSelected(topic.idx);
              const selectedCount = episodeCount(topic.idx);
              const isRegen = !!regenerating[topic.idx];
              const allEpisodes = topic.subtopics.map((_, i) => planEpisode(topic, plan, i));

              const isCollapsed = selectedTopicCount > 0 && !topicSelected;

              return (
                <article key={topic.idx} className={`topic-card bg-white rounded-card overflow-hidden transition-all ${topicSelected ? "selected border-2 border-primary shadow-[0_0_0_1px_rgba(107,78,255,0.08)]" : "border border-border"}`}>
                  <div className={`px-5 ${isCollapsed ? "py-3" : "pt-4 pb-4"}`}>
                    <div className="flex items-start gap-4">
                      <button onClick={()=>toggleTopic(topic.idx)}
                        className={`w-5 h-5 rounded-[5px] border-2 flex items-center justify-center shrink-0 mt-0.5 transition ${topicSelected?"bg-primary border-primary":"bg-white border-border hover:border-primary"}`}>
                        {topicSelected&&<Icon d={I.check} size={11} stroke={3} className="text-white"/>}
                      </button>

                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap mb-1.5">
                          <span className="mono text-[10.5px] font-semibold text-ink-3">#{String(topic.idx).padStart(2,"0")}</span>
                          <ScoreBadge kind="rel" value={topic.rel}/>
                          <ScoreBadge kind="vir" value={topic.vir}/>
                          <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-pill text-[11px] font-semibold" style={{background:"#EDE9FF",color:"#5A3FE0"}}>
                            <AgentMark/>{plan.recommendation} · {plan.recommendedCount} ep
                          </span>
                        </div>
                        <h3 className={`text-[16px] font-semibold display leading-snug ${topicSelected?"text-ink":isCollapsed?"text-ink-3":"text-ink-2"}`}>{topic.title}</h3>
                        {!isCollapsed&&(
                          <>
                            <p className="text-[12.5px] text-ink-2 mt-1.5 leading-relaxed">{topic.rationale}</p>
                            <div className="flex flex-wrap items-center gap-1.5 mt-2.5">
                              <span className="text-[10px] mono uppercase tracking-[0.12em] text-ink-3 mr-0.5">Evidence</span>
                              {topic.evidence?.map(e=><EvidencePill key={e} type={e}/>)}
                              {topic.sources.map(s=><SourcePill key={s}>{s}</SourcePill>)}
                            </div>
                          </>
                        )}
                      </div>

                      <div className="flex items-center gap-3 shrink-0">
                        {topicSelected&&(
                          <div className="flex items-center gap-1.5">
                            <span className="text-[11px] text-ink-2 font-medium">Episodes</span>
                            <button className="step-btn" onClick={()=>selectFirstN(topic.idx, selectedCount-1)} disabled={selectedCount<=1}>
                              <Icon d={I.minus} size={13} stroke={2.5}/>
                            </button>
                            <span className="ep-num">{selectedCount}</span>
                            <button className="step-btn" onClick={()=>selectFirstN(topic.idx, selectedCount+1)} disabled={selectedCount>=topic.subtopics.length}>
                              <Icon d={I.plus} size={13} stroke={2.5}/>
                            </button>
                          </div>
                        )}
                        {isCollapsed ? (
                          <button onClick={()=>toggleTopic(topic.idx)} className="text-[11.5px] text-primary font-medium hover:underline shrink-0">+ Select</button>
                        ) : (
                          <button onClick={()=>regenTopic(topic.idx)}
                            className={`w-8 h-8 rounded-input grid place-items-center transition ${isRegen?"bg-primary-soft text-primary":"text-ink-3 hover:text-primary hover:bg-primary-soft"}`}
                            title="Regenerate this topic">
                            <Icon d={I.refresh} size={14} stroke={2} className={isRegen?"animate-spin":""}/>
                          </button>
                        )}
                      </div>
                    </div>
                  </div>

                  {topicSelected&&(
                    <div className="fade-in border-t border-border bg-lavender/60 px-5 py-4">
                      {isRegen ? (
                        <div className="flex items-center gap-2 text-[12.5px] text-ink-2 py-2">
                          <Icon d={I.refresh} size={14} className="text-primary animate-spin"/>Regenerating recommendation and episode plan…
                        </div>
                      ) : (
                        <>
                          <div className="bg-white rounded-input border border-[#DDD8FF] p-4 mb-4">
                            <div className="flex items-start gap-3">
                              <AgentMark/>
                              <div className="flex-1 min-w-0">
                                <div className="flex items-center gap-2 flex-wrap">
                                  <span className="text-[13px] font-semibold text-ink">AI recommendation</span>
                                  <span className="px-2 py-0.5 rounded-pill text-[10.5px] font-medium" style={{background:"#D9F1E2",color:"#1E7E34"}}>{plan.confidence}% confidence</span>
                                </div>
                                <p className="text-[13px] text-ink-2 leading-relaxed mt-2">{plan.reasoning}</p>
                                <div className="grid sm:grid-cols-2 gap-4 mt-3">
                                  <div>
                                    <div className="mono text-[10px] uppercase tracking-[0.14em] text-ink-3 mb-1">Audience insight</div>
                                    <p className="text-[12.5px] leading-relaxed text-ink">{plan.audience}</p>
                                  </div>
                                  <div>
                                    <div className="mono text-[10px] uppercase tracking-[0.14em] text-ink-3 mb-1">Content depth</div>
                                    <p className="text-[12.5px] leading-relaxed text-ink">{plan.depth}</p>
                                  </div>
                                </div>
                              </div>
                            </div>
                          </div>

                          <div className="flex items-center justify-between mb-3">
                            <div className="flex items-center gap-2">
                              <span className="text-[10.5px] mono uppercase tracking-[0.14em] text-ink-3">AI-generated episode plan</span>
                              <span className="px-2 py-0.5 rounded-pill text-[10px] font-semibold" style={{background:"#EDE9FF",color:"#5A3FE0"}}>{selectedCount} of {allEpisodes.length} selected</span>
                            </div>
                            <div className="flex items-center gap-3 text-[11.5px]">
                              <button onClick={()=>selectFirstN(topic.idx, plan.recommendedCount)} className="text-primary font-medium hover:underline">Use recommendation</button>
                              <button onClick={()=>setSelections(prev=>{const next={...prev};delete next[topic.idx];return next;})} className="text-ink-2 hover:text-danger font-medium hover:underline">Clear</button>
                            </div>
                          </div>

                          <div className="grid gap-1.5">
                            {allEpisodes.map((episode, epIdx)=>{
                              const epSelected = isEpisodeSelected(topic.idx, epIdx);
                              return (
                                <button key={epIdx} onClick={()=>toggleEpisode(topic.idx, epIdx)}
                                  className={`w-full flex items-start gap-3 px-3.5 py-2.5 rounded-input text-left transition ${epSelected?"bg-white shadow-sm border border-primary/20":"bg-white/50 border border-transparent hover:bg-white hover:border-border"}`}>
                                  <span className={`w-4 h-4 rounded-[4px] border-2 flex items-center justify-center shrink-0 mt-0.5 transition ${epSelected?"bg-primary border-primary":"bg-white border-border"}`}>
                                    {epSelected&&<Icon d={I.check} size={9} stroke={3} className="text-white"/>}
                                  </span>
                                  <span className="mono text-[10px] font-bold shrink-0 mt-0.5 w-5" style={{color:epSelected?"#6B4EFF":"#ADADBE"}}>E{epIdx+1}</span>
                                  <span className="flex-1 min-w-0">
                                    <span className={`block text-[12.5px] leading-snug ${epSelected?"text-ink":"text-ink-3"}`}>{episode.title}</span>
                                    <span className="block text-[11.5px] text-ink-3 mt-1">{episode.format} · {episode.angle}</span>
                                  </span>
                                </button>
                              );
                            })}
                          </div>
                        </>
                      )}
                    </div>
                  )}

                  {!topicSelected&&!isCollapsed&&(
                    <div className="border-t border-border/50 px-5 py-2 flex items-center justify-end">
                      <button onClick={()=>toggleTopic(topic.idx)} className="text-[11.5px] text-primary font-medium hover:underline">+ Select topic</button>
                    </div>
                  )}
                </article>
              );
                })}
              </div>
            </div>

          </div>
        </div>
      </main>

      <div className="fixed bottom-0 left-[220px] right-0 bg-white border-t border-border px-8 py-4 flex items-center justify-between z-10 shadow-[0_-4px_16px_rgba(26,26,46,0.06)]">
        <div className="text-[13px] text-ink-2">
          {canProceed ? (
            <><span className="font-semibold text-ink">{selectedTopicCount}</span> topic{selectedTopicCount!==1?"s":""} selected · <span className="font-semibold text-primary">{totalEpisodes}</span> AI-suggested episodes selected</>
          ) : (
            <span className="text-ink-3">Select at least 1 AI topic recommendation to continue</span>
          )}
        </div>
        <div className="flex items-center gap-2">
          <a href="IdeationForm.html" className="h-10 px-4 rounded-pill text-[13.5px] font-medium text-ink hover:bg-lavender transition inline-flex items-center">
            Back
          </a>
          {canProceed ? (
            <a href="IdeationSubmit.html" className="h-10 px-5 rounded-pill bg-primary hover:bg-primary-hover transition text-white text-[13.5px] font-medium inline-flex items-center gap-2 shadow-[0_6px_14px_-4px_rgba(107,78,255,0.55)]">
              Continue to Approval<Icon d={I.chevR} size={15} stroke={2.25}/>
            </a>
          ) : (
            <button disabled className="h-10 px-5 rounded-pill bg-ink-3 text-white text-[13.5px] font-medium inline-flex items-center gap-2 cursor-not-allowed">
              Continue to Approval<Icon d={I.chevR} size={15} stroke={2.25}/>
            </button>
          )}
        </div>
      </div>
    </div>
  );
};

function App() {
  return (
    <div className="h-screen w-screen flex" data-screen-label="Topic Generation">
      <Sidebar active="ideation"/>
      <div className="flex-1 min-w-0 flex flex-col"><TopicGenerationPage/></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>window.parent.postMessage({type:'podium_navigate',page:'screens/TopicGeneration.html'},'*');</script></body>
</html>
