<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Podium AI — Hosts</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
  tailwind.config={theme:{extend:{colors:{lavender:'#EEEEF8',primary:'#6B4EFF','primary-hover':'#5A3FE0','primary-soft':'#EDE9FF',success:'#34A853',warning:'#F9AB00',danger:'#EA4335',ink:'#1A1A2E','ink-2':'#5F6368','ink-3':'#ADADBE',border:'#E2E2EE'},fontFamily:{sans:['Inter','system-ui','sans-serif']},boxShadow:{card:'0 1px 2px rgba(26,26,46,0.04), 0 4px 12px rgba(26,26,46,0.04)'},borderRadius:{card:'12px',input:'8px',pill:'999px'}}}}
</script>
<style>
  html,body,#root{height:100%}body{font-family:'Inter',sans-serif;color:#1A1A2E;background:#EEEEF8}.mono{font-family:'Inter',sans-serif}.display{letter-spacing:-0.02em}
  input:focus,textarea:focus,select:focus{outline:none;border-color:#6B4EFF!important;box-shadow:0 0 0 4px rgba(107,78,255,0.14)}
  textarea{resize:vertical}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { useState } = React;
const Icon=({d,size=18,stroke=1.75,className="",fill})=>(<svg width={size} height={size} viewBox="0 0 24 24" fill={fill||"none"} stroke="currentColor" strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" className={className}>{d}</svg>);
const I={
  home:<><path d="M3 10.5L12 3l9 7.5"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></>,
  ideation:<path d="M9 18h6M10 21h4M12 3a6 6 0 014 10.5c-.7.7-1 1.5-1 2.5H9c0-1-.3-1.8-1-2.5A6 6 0 0112 3z"/>,
  mic:<><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0014 0M12 18v3M9 21h6"/></>,
  brief:<><path d="M14 3H7a2 2 0 00-2 2v14a2 2 0 002 2h10a2 2 0 002-2V8z"/><path d="M14 3v5h5M9 13h6M9 17h4"/></>,
  voice:<><path d="M12 2a3 3 0 013 3v7a3 3 0 11-6 0V5a3 3 0 013-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v3M8 22h8"/></>,
  video:<><rect x="2" y="7" width="15" height="10" rx="2"/><path d="M17 9l5-3v12l-5-3"/></>,
  share2:<><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></>,
  studio:<><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></>,
  settings:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1.1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1.1 1.7 1.7 0 00-.3-1.8l-.1-.1A2 2 0 117 5.9l.1.1a1.7 1.7 0 001.8.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></>,
  bell:<><path d="M6 8a6 6 0 1112 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 004 0"/></>,
  moreV:<><circle cx="12" cy="5" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.4" fill="currentColor" stroke="none"/></>,sliders:<><path d="M4 21v-7M4 10V3M12 21v-9M12 8V3M20 21v-5M20 12V3"/><path d="M1 14h6M9 8h6M17 16h6"/></>,
  plus:<path d="M12 5v14M5 12h14"/>,
  check:<path d="M5 12l5 5L20 7"/>,
  trash:<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6M10 11v6M14 11v6M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></>,
  chevR:<path d="M9 6l6 6-6 6"/>,
  sparkle:<><path d="M12 3l1.8 5.4L19 10l-5.2 1.6L12 17l-1.8-5.4L5 10l5.2-1.6z"/><path d="M19 3l.9 2.7L22 7l-2.1.3L19 10l-.9-2.7L16 7l2.1-.3z"/></>,
};
const Logo=()=>(<a href="CMDashboard.html" className="flex items-center gap-2.5 hover:opacity-90 transition"><div className="relative w-10 h-10 rounded-[11px] overflow-hidden" style={{background:"#1A1A2E"}}><svg viewBox="0 0 40 40" width="40" height="40" fill="none"><rect width="40" height="40" rx="11" fill="#1A1A2E"/><rect x="16" y="8" width="8" height="15" rx="4" fill="#FFFFFF"/><path d="M11 19a9 9 0 0018 0" stroke="#FFFFFF" strokeWidth="2.5" strokeLinecap="round" fill="none"/><path d="M20 28v4" stroke="#FFFFFF" strokeWidth="2.5" strokeLinecap="round"/><path d="M16 32h8" stroke="#FFFFFF" strokeWidth="2.5" strokeLinecap="round"/></svg></div><div className="text-[20px] tracking-[-0.02em] text-ink" style={{fontWeight:700}}>Podium AI<span style={{color:"#6B4EFF"}}>.</span></div></a>);
const TINTS=[{bg:"#6B4EFF",fg:"#FFF"},{bg:"#FFE0DA",fg:"#B92E22"},{bg:"#D9F1E2",fg:"#1E7E34"},{bg:"#FFE9C0",fg:"#A86A00"},{bg:"#E3DCFF",fg:"#5A3FE0"},{bg:"#1A1A2E",fg:"#FFF"}];
const tintFor=n=>{if((n||"").trim()==="Fizza Asad")return TINTS[0];let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))>>>0;return TINTS[h%TINTS.length]};
const Avatar=({name,size=32})=>{const t=tintFor(name||"New Host");return <span className="inline-flex items-center justify-center font-semibold rounded-full shrink-0" style={{width:size,height:size,background:t.bg,color:t.fg,fontSize:size<=32?11:13}}>{(name||"New Host").split(/\s+/).slice(0,2).map(s=>s[0]).join("").toUpperCase()}</span>};
const HostPhoto=({name,photo,size=36})=>photo?(
  <img src={photo} alt={`${name||"Host"} profile`} className="rounded-full object-cover shrink-0 border border-border" style={{width:size,height:size}}/>
):<Avatar name={name} size={size}/>;
const RoleBadge=()=>(<span className="inline-flex items-center gap-1.5 rounded-pill font-medium px-2.5 py-1 text-[11.5px]" style={{background:"#EDE9FF",color:"#5A3FE0"}}><span className="w-1.5 h-1.5 rounded-full bg-primary"/>Content Marketer</span>);
const NavItem=({icon,label,active,href})=>(<a href={href} className={["relative w-full flex items-center gap-3 px-3 py-2 rounded-input text-[13px] transition",active?"bg-primary-soft text-primary font-medium":"text-ink-2 hover:bg-lavender hover:text-ink"].join(" ")}>{active&&<span className="absolute left-0 top-1.5 bottom-1.5 w-[3px] rounded-full bg-primary"/>}<Icon d={icon} size={16}/><span className="flex-1 text-left">{label}</span></a>);
const SectionLabel=({children})=>(<div className="text-[10px] mono uppercase tracking-[0.18em] text-ink-3 px-3 mt-5 mb-2">{children}</div>);
const Sidebar=({active="hosts"})=>{const [menu,setMenu]=useState(false);const u={name:"Fizza Asad",role:"Content Marketer"};return(<aside className="bg-white border-r border-border flex flex-col h-full" style={{width:220,minWidth:220}}><div className="px-5 pt-6 pb-4"><Logo/></div><div className="flex-1 overflow-y-auto pb-2"><div className="px-2"><div className="space-y-0.5 px-1"><NavItem icon={I.home} label="Dashboard" active={active==="dashboard"} href="CMDashboard.html"/><NavItem icon={I.ideation} label="Ideation" active={active==="ideation"} href="IdeationList.html"/><NavItem icon={I.mic} label="Episode Topics" active={active==="episodes"} href="EpisodeTopics.html"/><NavItem icon={I.brief} label="Brief Builder" active={active==="brief"} href="BriefList.html"/></div><SectionLabel>Production</SectionLabel><div className="space-y-0.5 px-1"><NavItem icon={I.video} label="Recordings" active={active==="recordings"} href="RecordingsList.html"/></div><SectionLabel>Account</SectionLabel><div className="space-y-0.5 px-1"><NavItem icon={I.sliders} label="Configuration" active={["configuration","voice","hosts"].includes(active)} href="Configuration.html"/><div className="ml-4 pl-4 border-l border-border space-y-0.5"><a href="BrandVoice.html" className={["block rounded-input px-3 py-1.5 text-[12px] transition",active==="voice"?"bg-primary-soft text-primary font-medium":"text-ink-3 hover:text-ink hover:bg-lavender"].join(" ")}>Brand Library</a><a href="Hosts.html" className={["block rounded-input px-3 py-1.5 text-[12px] transition",active==="hosts"?"bg-primary-soft text-primary font-medium":"text-ink-3 hover:text-ink hover:bg-lavender"].join(" ")}>Hosts</a></div><NavItem icon={I.settings} label="Settings" active={active==="settings"} href="Settings.html"/></div></div></div><div className="border-t border-border px-3 py-3"><div className="relative"><div className="flex items-center gap-2.5 px-2 py-2 rounded-input hover:bg-lavender cursor-pointer" onClick={()=>setMenu(v=>!v)}><Avatar name={u.name} size={32}/><div className="min-w-0 flex-1"><div className="text-[12.5px] font-semibold text-ink truncate leading-tight">{u.name}</div><div className="text-[10.5px] text-ink-2 truncate leading-tight">{u.role}</div></div><button className="w-7 h-7 rounded-input grid place-items-center text-ink-3 hover:text-ink hover:bg-white" onClick={e=>e.stopPropagation()}><Icon d={I.moreV} size={16}/></button></div>{menu&&<div className="absolute bottom-full left-0 right-0 mb-1 bg-white rounded-card border border-border shadow-card z-50 overflow-hidden"><a href="Login.html" className="flex items-center gap-2.5 px-3 py-2.5 text-[13px] font-medium text-danger hover:bg-[#FFF4F3] transition"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Log out</a></div>}</div></div></aside>)};
const Topbar=()=>(
  <header className="h-[64px] bg-white border-b border-border flex items-center px-8 gap-4 shrink-0">
    <nav className="flex-1 flex items-center gap-1.5 text-[13px]">{["Workspace","Configuration","Hosts"].map((c,i)=><React.Fragment key={c}>{i>0&&<Icon d={I.chevR} size={14} className="text-ink-3"/>}<span className={i===2?"text-ink font-medium":"text-ink-2"}>{c}</span></React.Fragment>)}</nav>
    <button className="w-9 h-9 rounded-input grid place-items-center text-ink-2 hover:bg-lavender hover:text-ink"><Icon d={I.bell} size={18}/></button>
    <RoleBadge/>
  </header>
);
const inputCls="w-full px-3.5 py-2.5 rounded-input border border-border text-[13px] text-ink placeholder:text-ink-3 bg-white transition";
const Field=({label,children})=><div><label className="block text-[12.5px] font-medium text-ink mb-1.5">{label}</label>{children}</div>;
const ToneChip=({label,active,onClick})=><button type="button" onClick={onClick} className={["px-3 py-1.5 rounded-pill text-[12.5px] font-medium border transition",active?"bg-primary-soft border-primary/40 text-primary":"bg-white border-border text-ink-2 hover:text-primary hover:border-primary/30"].join(" ")}>{label}</button>;
const SEED_HOSTS=[
  {id:"H-001",name:"Haseeb",title:"Executive host",expertise:"Enterprise AI strategy, procurement, board-level operating tradeoffs",tones:["Strategic","Direct"],bestFor:"CIO, CTO, and revenue leadership conversations that need calm pressure and concrete examples."},
  {id:"H-002",name:"Maya",title:"Operator host",expertise:"Product adoption, engineering workflows, practical implementation stories",tones:["Curious","Precise"],bestFor:"Technical guests where the conversation needs follow-up depth without becoming too tactical."},
  {id:"H-003",name:"Fizza",title:"Narrative host",expertise:"Founder stories, market positioning, category shifts, sharp episode framing",tones:["Narrative","Warm"],bestFor:"Founder/operator episodes that need story, momentum, and accessible language."},
];
const EMPTY_HOST={name:"",title:"",expertise:"",tones:[],bestFor:"",linkedin:"",email:"",notes:"",photo:""};
const TONES=["Strategic","Direct","Warm","Curious","Precise","Narrative","Commercial","Technical"];
const readiness=form=>["name","title","expertise","bestFor"].reduce((n,k)=>n+(form[k].trim()?1:0),0)+(form.tones.length?1:0);
const HostCard=({host})=>(
  <div className="bg-white rounded-card shadow-card border border-transparent hover:border-primary/20 hover:shadow-[0_2px_4px_rgba(26,26,46,0.06),0_8px_24px_rgba(26,26,46,0.08)] transition p-4">
    <div className="flex items-start gap-3">
      <HostPhoto name={host.name} photo={host.photo} size={40}/>
      <div className="flex-1 min-w-0">
        <div className="flex items-center justify-between gap-2">
          <div className="font-semibold text-[14px] text-ink">{host.name}</div>
          <span className="px-2 py-0.5 rounded-pill text-[10.5px] font-semibold bg-primary-soft text-primary">Configured</span>
        </div>
        <div className="text-[12px] text-ink-2 mt-0.5">{host.title}</div>
        <div className="mt-3">
          <div className="mono text-[10px] uppercase tracking-[0.14em] text-ink-3 mb-1">Expertise</div>
          <p className="text-[12px] text-ink-2 leading-relaxed">{host.expertise}</p>
        </div>
        <div className="mt-3">
          <div className="mono text-[10px] uppercase tracking-[0.14em] text-ink-3 mb-1">Best fit</div>
          <p className="text-[12px] text-ink-2 leading-relaxed">{host.bestFor}</p>
        </div>
        <div className="flex flex-wrap gap-1.5 mt-3">{host.tones.map(t=><span key={t} className="px-2 py-0.5 rounded-pill bg-lavender text-[10.5px] font-medium text-ink-2">{t}</span>)}</div>
      </div>
    </div>
  </div>
);
const App=()=>{
  const [hosts,setHosts]=useState(SEED_HOSTS);
  const [form,setForm]=useState(EMPTY_HOST);
  const [showForm,setShowForm]=useState(false);
  const [saved,setSaved]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const setPhotoFromFile=file=>{
    if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>set("photo",reader.result);
    reader.readAsDataURL(file);
  };
  const toggleTone=t=>set("tones",form.tones.includes(t)?form.tones.filter(x=>x!==t):[...form.tones,t]);
  const score=readiness(form);
  const save=()=>{
    if(!form.name.trim()) return;
    setHosts([{...form,id:`H-${String(hosts.length+1).padStart(3,"0")}`},...hosts]);
    setForm(EMPTY_HOST);
    setShowForm(false);
    setSaved(true);
    setTimeout(()=>setSaved(false),1800);
  };
  const openNewHost=()=>{setForm(EMPTY_HOST);setSaved(false);setShowForm(true);};
  const closeForm=()=>{setForm(EMPTY_HOST);setShowForm(false);};
  return(
    <div className="h-screen w-screen flex">
      <Sidebar active="hosts"/>
      <div className="flex-1 min-w-0 flex flex-col">
        <Topbar/>
        <main className="flex-1 overflow-y-auto">
          <div className="max-w-[1180px] mx-auto px-8 py-8">
            <div className="flex items-start justify-between gap-5 mb-7">
              <div>
                <div className="mono text-[11px] uppercase tracking-[0.18em] text-ink-2 mb-1.5">Configuration</div>
                <h1 className="text-[28px] font-bold display">Hosts</h1>
                <p className="text-[13.5px] text-ink-2 mt-1.5 max-w-[680px]">{showForm?"Create a new host profile with photo, expertise, tone, and recommendation guidance.":"Review configured podcast hosts first, then add new host profiles when the team needs another interviewer available for AI recommendations."}</p>
              </div>
              <div className="flex items-center gap-2 shrink-0">
                {saved&&<span className="inline-flex items-center gap-1.5 rounded-pill bg-[#D9F1E2] px-3 py-1.5 text-[12px] font-medium text-success"><Icon d={I.check} size={13} stroke={2.5}/>Host added</span>}
                <button type="button" onClick={showForm?closeForm:openNewHost} className={["h-9 px-4 rounded-pill text-[13px] font-medium transition inline-flex items-center gap-1.5",showForm?"border border-border bg-white text-ink-2 hover:text-ink hover:bg-lavender":"bg-primary hover:bg-primary-hover text-white shadow-[0_4px_10px_-2px_rgba(107,78,255,0.45)]"].join(" ")}>{!showForm&&<Icon d={I.plus} size={14}/>} {showForm?"Back to hosts":"Add new host"}</button>
              </div>
            </div>
            <div>
              {!showForm&&<section className="space-y-4">
                <div className="bg-white rounded-card shadow-card px-5 py-4 flex items-center justify-between gap-4">
                  <div>
                    <div className="text-[15px] font-semibold text-ink display">Configured hosts</div>
                    <div className="text-[12.5px] text-ink-2 mt-0.5">{hosts.length} host{hosts.length!==1?"s":""} available for episode planning and brief generation.</div>
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  {hosts.map(h=><HostCard key={h.id} host={h}/>)}
                </div>
              </section>}
              {showForm&&<section className="max-w-[780px] mx-auto space-y-4">
              <div className="bg-white rounded-card shadow-card overflow-hidden">
                <div className="px-6 py-4 border-b border-border flex items-center justify-between">
                  <div>
                    <div className="text-[15px] font-semibold text-ink display">New host profile</div>
                    <div className="text-[12.5px] text-ink-2 mt-0.5">This profile becomes available for AI host recommendations.</div>
                  </div>
                  <button type="button" onClick={closeForm} className="w-8 h-8 rounded-input grid place-items-center text-ink-3 hover:text-danger hover:bg-danger/10 transition">x</button>
                </div>
                <div className="px-6 py-5 space-y-5">
                  <Field label="Profile picture">
                    <div className="rounded-input border border-border bg-lavender/30 p-3 flex items-center gap-4">
                      <HostPhoto name={form.name||"New Host"} photo={form.photo} size={64}/>
                      <div className="min-w-0 flex-1">
                        <div className="flex items-center gap-2 flex-wrap">
                          <label className="h-8 px-3 rounded-pill bg-white border border-border text-[12.5px] font-medium text-ink-2 hover:text-primary hover:border-primary/30 transition inline-flex items-center cursor-pointer">
                            Upload photo
                            <input type="file" accept="image/*" className="hidden" onChange={e=>setPhotoFromFile(e.target.files&&e.target.files[0])}/>
                          </label>
                          {form.photo&&<button type="button" onClick={()=>set("photo","")} className="h-8 px-3 rounded-pill text-[12.5px] font-medium text-danger hover:bg-danger/10 transition">Remove</button>}
                        </div>
                        <div className="text-[11.5px] text-ink-3 mt-1.5">Use a square JPG or PNG for the cleanest avatar crop.</div>
                      </div>
                    </div>
                  </Field>
                  <div className="grid grid-cols-1 gap-4">
                    <Field label="Full name"><input value={form.name} onChange={e=>set("name",e.target.value)} placeholder="e.g. Aisha Khan" className={inputCls}/></Field>
                    <Field label="Host role"><input value={form.title} onChange={e=>set("title",e.target.value)} placeholder="e.g. Executive host" className={inputCls}/></Field>
                  </div>
                  <Field label="Expertise areas"><textarea value={form.expertise} onChange={e=>set("expertise",e.target.value)} rows={3} placeholder="Topics this host is strongest on: AI strategy, procurement, founder stories..." className={inputCls+" leading-relaxed"}/></Field>
                  <Field label="Hosting tone">
                    <div className="flex flex-wrap gap-2">{TONES.map(t=><ToneChip key={t} label={t} active={form.tones.includes(t)} onClick={()=>toggleTone(t)}/>)}</div>
                  </Field>
                  <Field label="Best-fit episodes"><textarea value={form.bestFor} onChange={e=>set("bestFor",e.target.value)} rows={3} placeholder="Describe when the AI should recommend this host." className={inputCls+" leading-relaxed"}/></Field>
                  <div className="grid grid-cols-1 gap-4">
                    <Field label="LinkedIn"><input value={form.linkedin} onChange={e=>set("linkedin",e.target.value)} placeholder="linkedin.com/in/..." className={inputCls}/></Field>
                    <Field label="Email"><input value={form.email} onChange={e=>set("email",e.target.value)} placeholder="name@company.com" className={inputCls}/></Field>
                  </div>
                  <Field label="Internal notes"><textarea value={form.notes} onChange={e=>set("notes",e.target.value)} rows={2} placeholder="Scheduling notes, availability, topics to avoid..." className={inputCls+" leading-relaxed"}/></Field>
                  <div className="flex items-center gap-3 pt-1">
                    <button onClick={save} disabled={!form.name.trim()} className="h-10 px-5 rounded-pill bg-primary hover:bg-primary-hover disabled:bg-ink-3 disabled:cursor-not-allowed text-white text-[13px] font-medium transition inline-flex items-center gap-2 shadow-[0_6px_14px_-4px_rgba(107,78,255,0.55)]"><Icon d={I.check} size={14}/>Save host</button>
                    <button onClick={()=>setForm(EMPTY_HOST)} className="h-10 px-4 rounded-pill border border-border text-[13px] font-medium text-ink-2 hover:text-ink hover:bg-lavender transition">Clear</button>
                  </div>
                </div>
              </div>
                <div className="bg-white rounded-card shadow-card p-5">
                  <div className="mono text-[10.5px] uppercase tracking-[0.14em] text-ink-3 mb-3">AI readiness</div>
                  <div className="flex items-center gap-3">
                    <HostPhoto name={form.name||"New Host"} photo={form.photo} size={42}/>
                    <div className="min-w-0">
                      <div className="text-[15px] font-semibold text-ink truncate">{form.name||"New host"}</div>
                      <div className="text-[12px] text-ink-2">{form.title||"Role not set"}</div>
                    </div>
                  </div>
                  <div className="mt-4 h-1.5 rounded-full bg-lavender overflow-hidden"><div className="h-full rounded-full bg-primary transition-all" style={{width:`${score*20}%`}}/></div>
                  <div className="mt-2 text-[12px] text-ink-2">{score}/5 profile signals ready for recommendations</div>
                  <div className="mt-4 rounded-input p-3" style={{background:"#F6F2FF",border:"1px solid #DCD3FF"}}>
                    <div className="flex items-center gap-2 text-[12.5px] font-semibold text-primary"><Icon d={I.sparkle} size={14}/>Used by episode planning</div>
                    <p className="text-[12px] text-ink-2 leading-relaxed mt-1.5">The agent uses host tone and expertise to suggest the strongest interviewer before brief generation.</p>
                  </div>
                </div>
              </section>}
            </div>
          </div>
        </main>
      </div>
    </div>
  );
};
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>window.parent.postMessage({type:'podium_navigate',page:'screens/Hosts.html'},'*');</script></body>
</html>
