        </div>
        <div className="grid md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-border/70">
          <div className="p-5">
            <div className="text-[13px] font-semibold text-ink mb-3">Key Questions</div>
            <div className="space-y-3">{item.questions.map((q,idx)=><div key={q} className="flex gap-3 text-[13px] leading-relaxed text-ink-2"><span className="mono text-[10px] font-semibold text-primary mt-1">Q{idx+1}</span><span>{q}</span></div>)}</div>
          </div>
          <div className="p-5">
            <div className="text-[13px] font-semibold text-ink mb-3">Talking Points</div>
            <div className="space-y-3">{item.talkingPoints.map((p,idx)=><div key={p} className="flex gap-3 text-[13px] leading-relaxed text-ink-2"><span className="w-1.5 h-1.5 rounded-full bg-primary mt-2 shrink-0"/><span>{p}</span></div>)}</div>
          </div>
        </div>
      </section>
      {hostModal&&<HostDetailModal host={item.hostProfile} episodeTitle={item.title} onClose={()=>setHostModal(false)}/>}
      {guestModal&&<GuestDetailModal guest={item.guest} episodeTitle={item.title} onClose={()=>setGuestModal(false)}/>}
    </div>
  );
};

const DecisionPanel=({item,episodeStatuses})=>{
  const [decision,setDecision]=useState(null);
  const [feedback,setFeedback]=useState("");
  const [generalNotes,setGeneralNotes]=useState("");
  const [mode,setMode]=useState("idle");

  // Brief mode — keep simple approve/reject flow
  if(item.kind==="brief"){
    if(decision){
      return(
        <aside className="section-card p-5 lg:sticky lg:top-6">
          <div className="w-10 h-10 rounded-full grid place-items-center mb-4" style={{background:decision==="approved"?"#D9F1E2":"#FFE0DA",color:decision==="approved"?"#1E7E34":"#B92E22"}}><Icon d={decision==="approved"?I.check:I.x} size={18} stroke={2.5}/></div>
          <h2 className="text-[17px] font-semibold display">{decision==="approved"?"Approved":"Feedback sent"}</h2>
          <p className="text-[12.5px] text-ink-2 mt-2">The review decision is recorded for the content team.</p>
          <a href="MMDashboard.html" className="mt-5 h-10 px-4 rounded-pill bg-primary hover:bg-primary-hover text-white text-[13px] font-medium inline-flex items-center gap-2 transition">Back to dashboard</a>
        </aside>
      );
    }
    return(
      <aside className="section-card p-5 lg:sticky lg:top-6">
        <div className="mono text-[10.5px] uppercase tracking-[0.16em] text-ink-3">Manager Decision</div>
        <h2 className="text-[17px] font-semibold display mt-1">Review outcome</h2>
        <div className="mt-4 grid gap-2">
          <button onClick={()=>setDecision("approved")} className="h-10 rounded-pill bg-success hover:bg-success/90 text-white text-[13px] font-semibold inline-flex items-center justify-center gap-2 transition shadow-[0_5px_12px_-5px_rgba(52,168,83,0.7)]"><Icon d={I.check} size={14} stroke={2.5}/>Approve Brief &amp; Guest</button>
          <button onClick={()=>setMode("reject")} className="h-10 rounded-pill border border-border text-[13px] font-semibold text-ink-2 hover:text-danger hover:border-danger/30 hover:bg-[#FFF4F3] inline-flex items-center justify-center gap-2 transition"><Icon d={I.message} size={14}/>Reject + Feedback</button>
        </div>
        {mode==="reject"&&(
          <div className="mt-4 rounded-input border border-border bg-lavender/60 p-3">
            <label className="text-[11.5px] font-medium text-ink-2 mb-2 block">Why are you rejecting this?</label>
            <textarea value={feedback} onChange={e=>setFeedback(e.target.value)} autoFocus rows={4}
              className="w-full resize-none bg-white border border-border rounded-input px-3 py-2.5 text-[13px] leading-relaxed outline-none focus:border-primary"
              placeholder="Add clear feedback for the content team..."/>
            <button onClick={()=>feedback.trim()&&setDecision("rejected")} disabled={!feedback.trim()}
              className={`mt-3 h-9 px-4 rounded-pill text-[12.5px] font-medium inline-flex items-center gap-1.5 transition ${feedback.trim()?"bg-danger hover:bg-danger/90 text-white":"bg-ink-3 text-white cursor-not-allowed opacity-60"}`}>
              <Icon d={I.x} size={13} stroke={2.5}/>Send feedback
            </button>
          </div>
        )}
        <div className="mt-5 pt-4 border-t border-border space-y-3">
          <MetaTile label="Submitted By" value={item.submittedBy}/>
          <MetaTile label="Waiting" value={item.age}/>
          <MetaTile label="Priority" value={item.priority}/>
          <MetaTile label="Host" value={item.hostProfile.name}/>
          <MetaTile label="Guest" value={item.guest.name}/>
        </div>
      </aside>
    );
  }

  // Ideation mode — episode-driven submit flow
  const statuses=Object.values(episodeStatuses||{});
  const approvedCount=statuses.filter(s=>s==="Approved").length;
  const rejectedCount=statuses.filter(s=>s==="Rejected").length;
  const pendingCount=statuses.filter(s=>s==="Pending").length;

  if(decision==="submitted"){
    return(
      <aside className="section-card p-5 lg:sticky lg:top-6">
        <div className="w-10 h-10 rounded-full bg-primary/10 grid place-items-center mb-4"><Icon d={I.check} size={18} stroke={2.5} className="text-primary"/></div>
        <h2 className="text-[17px] font-semibold display">Review submitted</h2>
        <p className="text-[12.5px] text-ink-2 mt-2 mb-4">Your decisions and notes have been sent to the content team.</p>
        <div className="grid grid-cols-3 gap-2 mb-5">
          <div className="rounded-input bg-success/8 p-2.5 text-center" style={{background:"#D9F1E2"}}><div className="text-[18px] font-bold text-success">{approvedCount}</div><div className="text-[10px] text-success/80 font-medium mt-0.5">Approved</div></div>
          <div className="rounded-input p-2.5 text-center" style={{background:"#FFE0DA"}}><div className="text-[18px] font-bold" style={{color:"#B92E22"}}>{rejectedCount}</div><div className="text-[10px] font-medium mt-0.5" style={{color:"#B92E22"}}>Rejected</div></div>
          <div className="rounded-input p-2.5 text-center" style={{background:"#FFE9C0"}}><div className="text-[18px] font-bold" style={{color:"#A86A00"}}>{pendingCount}</div><div className="text-[10px] font-medium mt-0.5" style={{color:"#A86A00"}}>Pending</div></div>
        </div>
        <a href="MMDashboard.html" className="w-full h-10 px-4 rounded-pill bg-primary hover:bg-primary-hover text-white text-[13px] font-medium inline-flex items-center justify-center gap-2 transition">Back to dashboard</a>
      </aside>
    );
  }

  return(
    <aside className="section-card p-5 lg:sticky lg:top-6 space-y-5">
      <div>
        <div className="flex items-center gap-2 mb-1">
          <div className="w-[3px] h-3.5 rounded-full bg-primary shrink-0"/>
          <span className="mono text-[10.5px] uppercase tracking-[0.16em] text-ink-2 font-semibold">Manager Decision</span>
        </div>
        <h2 className="text-[17px] font-semibold display mt-1">Review outcome</h2>
      </div>

      {/* Live episode decision summary */}
      <div className="grid grid-cols-3 gap-2">
        <div className="rounded-input p-2.5 text-center border border-success/20" style={{background:"#D9F1E2"}}><div className="text-[20px] font-bold text-success leading-none">{approvedCount}</div><div className="text-[10px] text-success/80 font-medium mt-1">Approved</div></div>
        <div className="rounded-input p-2.5 text-center border border-danger/20" style={{background:"#FFE0DA"}}><div className="text-[20px] font-bold leading-none" style={{color:"#B92E22"}}>{rejectedCount}</div><div className="text-[10px] font-medium mt-1" style={{color:"#B92E22"}}>Rejected</div></div>
        <div className="rounded-input p-2.5 text-center border border-warning/20" style={{background:"#FFE9C0"}}><div className="text-[20px] font-bold leading-none" style={{color:"#A86A00"}}>{pendingCount}</div><div className="text-[10px] font-medium mt-1" style={{color:"#A86A00"}}>Pending</div></div>
      </div>
      <p className="text-[11.5px] text-ink-3 -mt-2">Approve or reject each episode in the topic plan. Per-episode notes are optional.</p>

      {/* General notes */}
      <div>
        <label className="text-[12px] font-medium text-ink-2 block mb-1.5">Overall notes <span className="text-ink-3 font-normal">(optional)</span></label>
        <textarea value={generalNotes} onChange={e=>setGeneralNotes(e.target.value)} rows={3}
          className="w-full resize-none bg-white border border-border rounded-input px-3 py-2.5 text-[12.5px] leading-relaxed outline-none focus:border-primary text-ink-2 placeholder:text-ink-3"
          placeholder="Any overall comments for the content team..."/>
      </div>

      {/* Submit */}
      <button onClick={()=>setDecision("submitted")}
        className="w-full h-10 rounded-pill bg-primary hover:bg-primary-hover text-white text-[13px] font-semibold inline-flex items-center justify-center gap-2 transition shadow-[0_5px_14px_-4px_rgba(107,78,255,0.5)]">
        <Icon d={I.send} size={14} stroke={2}/>Submit Review
      </button>

      <div className="pt-4 border-t border-border space-y-3">
        <MetaTile label="Submitted By" value={item.submittedBy}/>
        <MetaTile label="Waiting" value={item.age}/>
        <MetaTile label="Priority" value={item.priority}/>
      </div>
    </aside>
  );
};

const DetailPage=()=>{
  const params=new URLSearchParams(window.location.search);
  const kind=params.get("kind")||"ideation";
  const id=params.get("id")||(kind==="brief"?"brief-1":"ideation-1");
  const item=REVIEW_DETAILS[`${kind}:${id}`]||REVIEW_DETAILS["ideation:ideation-1"];
  const active=item.kind==="brief"?"brief-reviews":"ideation-reviews";

  const initialStatuses=item.kind==="ideation"
    ?Object.fromEntries(item.topics.flatMap(t=>t.episodes.map((_,idx)=>[`${t.id}-${idx}`,"Pending"])))
    :{};
  const [episodeStatuses,setEpisodeStatuses]=useState(initialStatuses);
  const setEpisodeStatus=(topicId,idx,status)=>setEpisodeStatuses(prev=>({...prev,[`${topicId}-${idx}`]:status}));
  const setTopicStatus=(topic,status)=>setEpisodeStatuses(prev=>{const next={...prev};topic.episodes.forEach((_,idx)=>{next[`${topic.id}-${idx}`]=status;});return next;});

  return (
    <div className="h-full flex flex-col bg-lavender">
      <Topbar kind={item.kind}/>
      <main className="flex-1 overflow-y-auto">
        <div className="max-w-[1180px] mx-auto px-8 py-8">
          <a href={item.kind==="brief"?"MMBriefs.html":"MMIdeations.html"} className="text-[12.5px] font-medium text-ink-2 hover:text-primary inline-flex items-center gap-1.5 mb-5"><Icon d={I.arrowL} size={14}/>{item.kind==="brief"?"Back to brief reviews":"Back to ideation reviews"}</a>
          <div className="mb-5">
            <div className="flex items-center gap-2 mb-2">
              <span className="px-2.5 py-1 rounded-pill text-[11px] font-semibold" style={{background:item.kind==="brief"?"#D9F1E2":"#EDE9FF",color:item.kind==="brief"?"#1E7E34":"#5A3FE0"}}>{item.label}</span>
              <span className="inline-flex items-center gap-1 text-[11.5px] text-ink-3"><Icon d={I.clock} size={12}/>{item.age}</span>
            </div>
            <h1 className="text-[28px] font-bold display leading-tight">{item.title}</h1>
            <div className="mt-2 flex flex-wrap gap-x-4 gap-y-1 text-[12.5px] text-ink-2">
              <span>{item.segment}</span>
              {item.kind==="brief" ? (
                <>
                  <span>{item.episode.id}</span>
                  <span>Host: <span className="font-medium text-ink">{item.host}</span></span>
                  <span>Guest: <span className="font-medium text-ink">{item.guest.name}</span></span>
                </>
              ) : (
                <>
                  <span>Submitted by <span className="font-medium text-ink">{item.submittedBy}</span></span>
                  <span>{item.count}</span>
                </>
              )}
              <span>{item.audience}</span>
            </div>
          </div>
          <AgentBanner item={item}/>
          <div className="grid lg:grid-cols-[minmax(0,1fr)_320px] gap-6 mt-6 items-start">
            <div>{item.kind==="brief"?<BriefContent item={item}/>:<IdeationContent item={item} episodeStatuses={episodeStatuses} setEpisodeStatus={setEpisodeStatus} setTopicStatus={setTopicStatus}/>}</div>
            <DecisionPanel item={item} episodeStatuses={episodeStatuses}/>
          </div>
        </div>
      </main>
    </div>
  );
};

function App(){
  const params=new URLSearchParams(window.location.search);
  const kind=params.get("kind")||"ideation";
  return (
    <div className="h-screen w-screen flex" data-screen-label="Manager Review Detail">
      <Sidebar active={kind==="brief"?"brief-reviews":"ideation-reviews"}/>
      <div className="flex-1 min-w-0 flex flex-col"><DetailPage/></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>window.parent.postMessage({type:'podium_navigate',page:'screens/MMReviewDetail.html'},'*');</script></body>
</html>
